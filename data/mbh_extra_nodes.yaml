# ═══════════════════════════════════════════════════════════════════════
# mbh_extra_nodes.yaml — teachings present in MBH but absent/weak in BG
# ═══════════════════════════════════════════════════════════════════════
# these are the INVERSE of the BG-derived nodes: teachings that the
# Gita selects out, compresses, mutes, or transforms.
#
# discovery method: bottom-up extraction from high-density non-BG
# doctrinal passages (Shantiparva, Anushasana, Vanaparva).
#
# each node gets a provisional inverse_type:
#   A = BG-central and MBH-wide (for reference only)
#   B = BG-central but MBH-local
#   C = BG-present but weak elsewhere
#   D = MBH-strong but BG-weak
#   E = MBH-strong and BG-absent
#
# status: DISCOVERY PHASE — add candidates as found.
# ═══════════════════════════════════════════════════════════════════════

nodes:

