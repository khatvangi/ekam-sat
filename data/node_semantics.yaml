# ═══════════════════════════════════════════════════════════════════════
# node_semantics.yaml — semantic meaning families for doctrinal nodes
# ═══════════════════════════════════════════════════════════════════════
# each node defines: canonical statement, required conceptual features,
# expression families (direct, paraphrase, inferential), exclusion cues,
# and validation examples. this replaces pure lexical matching with
# structured semantic satisfaction scoring.
#
# status: GOLD STANDARD nodes first (15-20), then expand to all 123.
# format follows ChatGPT's recommended schema with adaptations.
# ═══════════════════════════════════════════════════════════════════════

nodes:

  # ─── GOLD STANDARD SET 1: CORE METAPHYSICAL ────────────────────────

  - id: N006
    short_label: atman_indestructible
    canonical_statement: >
      the true self (Atman) is unborn, undying, eternal, and not destroyed
      when the body is destroyed.
    domain:
      primary: tattva
      secondary: ontology
    bg_status:
      present: true
      centrality: 0.95
      anchor_verses: ["2.20", "2.19", "2.17", "2.23", "2.24"]
    semantic_profile:
      conceptual_features_required:
        - enduring_self
        - body_self_distinction
      conceptual_features_optional:
        - unborn
        - undying
        - indestructible
        - not_slain_when_body_slain
        - eternal_unchanging
      exclusion_features:
        - merely_praise_of_longevity
        - generic_reference_to_life
        - bodily_survival_without_ontology
        - genealogical_continuity
    expression_families:
      direct_hk:
        - "na hanyate hanyamAne zarIre"
        - "ajo nityaH zAzvato yaM purANaH"
        - "avinAzi tu tad viddhi"
        - "na jAyate mriyate vA kadAcin"
        - "nityaH sarvagataH sthANuH"
      paraphrase_hk:
        - "deha vinAze pi AtmA na vinaSyati"
        - "zarIra nAza na spRzati AtmAnam"
        - "avinAzI avyayaH AtmA"
      inferential_patterns:
        - "grief over death corrected through self-body distinction"
        - "slaying denied at the level of true self"
        - "the body perishes but the dweller does not"
    contextual_cues:
      positive: [grief_context, battle_context, mortality_discussion, funeral_lament_with_correction]
      negative: [genealogy_only, mere_funeral_without_ontology, bodily_heroism]
    validation_examples:
      positive: ["06023019", "06023020", "06023017"]
      hard_positive: []  # TO CURATE: find non-BG verses that clearly teach this
      false_positive: []  # TO CURATE: verses with nitya/aja that DON'T teach atman doctrine

  - id: N009
    short_label: sat_asat
    canonical_statement: >
      the real (sat) never ceases to be; the unreal (asat) never comes to be.
      the boundary between them is seen by seers of truth.
    domain:
      primary: tattva
      secondary: ontology
    bg_status:
      present: true
      centrality: 0.90
      anchor_verses: ["2.16"]
    semantic_profile:
      conceptual_features_required:
        - being_nonbeing_distinction
        - ontological_permanence
      conceptual_features_optional:
        - truth_seekers_vision
        - sat_as_ultimate_reality
        - asat_as_nonexistent
      exclusion_features:
        - merely_true_false_in_moral_sense
        - sat_as_good_person
        - generic_praise
    expression_families:
      direct_hk:
        - "nAsato vidyate bhAvaH"
        - "nAbhAvo vidyate sataH"
        - "sadasat"
      paraphrase_hk:
        - "yat sat tat sadA asti"
        - "asat na kadAcid asti"
      inferential_patterns:
        - "permanent vs impermanent as ontological categories"
        - "discrimination between real and apparent"
    validation_examples:
      positive: ["06024016"]
      hard_positive: []
      false_positive: []

  # ─── GOLD STANDARD SET 2: KARMA / ACTION TEACHINGS ─────────────────

  - id: N017
    short_label: nishkama_karma
    canonical_statement: >
      act without attachment to the fruits of action.
      you have the right to action but not to its results.
    domain:
      primary: sadhana
      secondary: karma
    bg_status:
      present: true
      centrality: 0.95
      anchor_verses: ["2.47", "2.48"]
    semantic_profile:
      conceptual_features_required:
        - action_performed
        - fruit_detachment
      conceptual_features_optional:
        - right_to_action_not_result
        - equanimity_in_outcome
        - offering_action_to_divine
      exclusion_features:
        - mere_inaction
        - laziness_framed_as_detachment
        - abandoning_all_action
    expression_families:
      direct_hk:
        - "karmaNy evAdhikAras te mA phaleSu kadAcana"
        - "mA karmaphalaheturbhUH"
        - "yogasthaH kuru karmANi"
      paraphrase_hk:
        - "karmaphalam tyaktvA"
        - "phalAsaGgam tyaktvA"
        - "niSkAmakarma"
        - "phale asakta kuru"
      inferential_patterns:
        - "performing duty while surrendering personal stake in outcome"
        - "action as offering rather than acquisition"
        - "discipline of intention while acting"
    validation_examples:
      positive: ["06024047", "06024048"]
      hard_positive: []
      false_positive: []

  - id: N016
    short_label: desire_chain
    canonical_statement: >
      contemplating sense objects creates attachment; from attachment
      comes desire; from desire anger; from anger delusion; from delusion
      loss of memory; from that, destruction of discrimination; from that, ruin.
    domain:
      primary: tattva
      secondary: psychology
    bg_status:
      present: true
      centrality: 0.85
      anchor_verses: ["2.62", "2.63"]
    semantic_profile:
      conceptual_features_required:
        - causal_chain_from_desire
        - progressive_degradation
      conceptual_features_optional:
        - sense_object_contemplation
        - attachment_leading_to_anger
        - delusion_from_anger
        - destruction_of_discrimination
      exclusion_features:
        - mere_list_of_negative_qualities
        - anger_without_causal_chain
        - desire_as_positive
    expression_families:
      direct_hk:
        - "dhyAyato viSayAn puMsaH saGgas teSUpajAyate"
        - "saGgAt saMjAyate kAmaH kAmAt krodho bhijAyate"
        - "krodhAd bhavati saMmohaH"
      paraphrase_hk:
        - "kAma krodha lobha moha"
        - "indriyArtha saGga"
        - "kAma prasakti vinAza"
      inferential_patterns:
        - "cascading psychological degradation from initial attachment"
        - "desire as the root of a chain leading to ruin"
    validation_examples:
      positive: ["06024062", "06024063"]
      hard_positive: []
      false_positive: []

