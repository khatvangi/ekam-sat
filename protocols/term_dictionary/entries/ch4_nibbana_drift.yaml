

# ─────────────────────────────────────────────────────────────
# ch4 — nibbāna drift: from fire-going-out to ontological category
# ─────────────────────────────────────────────────────────────
#
# the drift tracked: nibbāna as fire metaphor (cessation of craving)
# → asaṅkhata dhamma (the unconditioned, a classified reality)
# → nirvāṇa = saṃsāra (ontological equation).
#
# index: H (hardening) — same as ch1.
#   numerator: ontic/definitional language (asaṅkhata, nibbāna-dhātu, parinibbāna)
#   denominator: release/practice language (vimutti, virāga, vossagga, nibbidā, taṇhākkhaya)
#   primary: nibbāna (the anchor term)
#   tracks hardening: amata, aggi, nirodha
#
# decolonization axis: "nirvana" is the most mistranslated buddhist
# term in western languages. it is NOT "annihilation" (schopenhauer),
# NOT "heaven" (christian), NOT "nothingness" (existentialist).
# all three readings import abrahamic/enlightenment categories.
# the fire metaphor operates within its own cultural frame: in vedic
# india, fire that goes out does not "go somewhere" — the question
# itself is grammatically wrong (MN 72).
#
# 12 entries, ~1100 lines.
# ─────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────
# 1. NIBBANA (extinction / unbinding / the going-out)
# ─────────────────────────────────────────────────────────────
nibbana:
  id: nibbana
  concept: extinction / unbinding / the going-out of the fires of craving
  tier: primary
  family: ["asankhata", "vimutti", "viraga", "amata", "nirodha", "aggi_nibbana"]
  chapters: ["ch4", "ch1"]
  semantic_field: soteriology
  forms:
    pali:
    - term: nibbāna
      grammar: neuter noun
      root: nir-vā (to blow out, to extinguish) OR nir-vana (without binding/craving)
      note: 'the soteriological goal. etymologically tied to the FIRE metaphor: the going-out
        of the fires of rāga (craving), dosa (aversion), moha (delusion). the dual etymology
        (nir-vā = blow out, nir-vana = without binding) is itself evidence that the term was
        understood through METAPHOR, not definition. the fire does not "go somewhere" — it
        ceases. this is the key to the entire chapter.

        '
    - term: nibbānaṁ
      grammar: accusative/nominative
      note: most common case form in the suttas — nibbāna as the object of realization
    - term: nibbuto
      grammar: past participle (nir + vā)
      note: '''extinguished'' — applied to the fire in MN 72 and to the arahat. the SAME word
        for both: the arahat IS the extinguished fire.

        '
    - term: parinibbāyati
      grammar: verb (present indicative)
      note: '''fully goes out'' — the verb form, used for the process of final cessation'
    sanskrit:
    - term: nirvāṇa
      grammar: neuter noun
      note: 'extinction — in mahāyāna: nirvāṇa = saṃsāra (nāgārjuna, MMK 25.19-20). the
        early fire-metaphor is replaced by an ontological equation.'
    - term: parinirvāṇa
      grammar: neuter noun
      note: 'final extinction — in mahāyāna narrative: the mahāparinirvāṇa becomes an
        elaborate cosmological EVENT, not a simple cessation.'
    chinese:
    - term: 涅槃
      pinyin: nièpán
      translator: standard (phonetic transliteration)
      translation_choice_note: 'phonetic transliteration — the chinese translators deemed nibbāna
        UNTRANSLATABLE. this is itself significant: they did not attempt a semantic equivalent
        (unlike most other terms). the phonetic approach preserves the non-translatability,
        which is more honest than english "extinction" or "blowing out."

        '
    - term: 般涅槃
      pinyin: bānnièpán
      translator: standard
      translation_choice_note: 'parinibbāna — phonetic with the pari- prefix'
    - term: 滅度
      pinyin: mièdù
      translator: kumārajīva (semantic alternative)
      translation_choice_note: '''extinction-and-crossing'' — a rare semantic translation attempt.
        miè = extinction/cessation + dù = crossing/ferrying over. combines the fire metaphor
        with the raft metaphor.'
    jain:
    - term: nirvāṇa
      language: ardhamagadhi/sanskrit
      note: 'jains ALSO use nirvāṇa — for the final liberation of the jīva (soul). but jain
        nirvāṇa PRESERVES a permanent entity (the jīva). buddhist nibbāna does NOT. the shared
        term masks a fundamental difference: jain nirvāṇa = soul freed from matter; buddhist
        nibbāna = cessation of craving with no posited substrate.'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'cessation of craving, hatred, and delusion — described VIA METAPHOR rather than
      definition. the fire simile is central: the fire goes out when its fuel (upādāna) is
      exhausted. the question "where did the fire go?" is grammatically wrong — it does not
      "go" anywhere. LIKEWISE: nibbāna is not a place, not a state, not a thing. it is the
      cessation of the process.

      '
    key_texts: ["MN 72 aggivacchagotta", "SN 43 asaṅkhata saṃyutta", "MN 26 ariyapariyesanā",
      "SN 56.11 dhammacakkappavattana"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn72_root-pli-ms.json
      reference: MN 72:19.16
      quote: yo te ayaṁ purato aggi nibbuto so aggi ito katamaṁ disaṁ gato
      context: '''this fire that is extinguished before you — in what direction has it gone?''
        the buddha asks vacchagotta about a fire that has gone out. the question exposes the
        GRAMMATICAL ERROR in asking where nibbāna "is." fire does not "go" somewhere when it
        goes out. nibbāna does not "go" somewhere when craving ceases. the question has the
        wrong grammar.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn72_root-pli-ms.json
      reference: MN 72:19.18
      quote: aggi tiṇakaṭṭhupādānaṁ paṭicca ajali tassa ca pariyādānā aññassa ca anupahārā
        anāhāro nibbutotveva saṅkhyaṁ gacchati
      context: '''the fire burned dependent on grass-and-wood fuel; when that is exhausted and
        nothing else is supplied, being fuelless, it is reckoned as extinguished.'' the fire
        metaphor in its purest form: nibbāna = fuelless. upādāna (fuel/clinging) is what burns.
        when the fuel is gone, the fire is gone. no direction, no destination, no residual entity.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn26_root-pli-ms.json
      reference: MN 26:19.5
      quote: sabbasaṅkhārasamatho sabbūpadhipaṭinissaggo taṇhākkhayo virāgo nirodho nibbānaṁ
      context: '''the stilling of all formations, the relinquishment of all acquisitions,
        the destruction of craving, dispassion, cessation, nibbāna.'' the SEQUENCE matters:
        nibbāna is the END of a chain of release-language (taṇhākkhaya → virāga → nirodha →
        nibbāna). it is not defined independently — it is pointed to through the process of
        letting go.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn43/sn43.14-43_root-pli-ms.json
      reference: SN 43.34:1.1
      quote: Nibbānañca vo bhikkhave desessāmi nibbānagāmiñca maggaṁ
      context: '''I will teach you nibbāna and the path leading to nibbāna.'' from the
        asaṅkhata saṃyutta (SN 43), which lists 33 synonyms for nibbāna. the MULTIPLICITY of
        epithets (amata, virāga, nirodha, taṇhākkhaya, etc.) is itself evidence that the early
        texts POINT to nibbāna rather than DEFINE it. no single definition captures it.

        '
    corpus_count: ~2400 (nibbāna-terms across sutta piṭaka + chinese āgamas)
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma / early scholastic
    meaning: 'nibbāna becomes one of four paramattha dhammas (ultimate realities): citta
      (consciousness), cetasika (mental factors), rūpa (matter), nibbāna. it is classified as
      asaṅkhata dhamma (unconditioned reality) — the ONLY unconditioned dhamma. this is the
      FIRST HARDENING: from fire-metaphor (pointing-language) to classified reality (defining-
      language).

      '
    key_texts: ["dhammasaṅgaṇi", "abhidhammattha saṅgaha", "vibhaṅga"]
    citations: []
    corpus_count: ~50 (nibbāna in abhidhamma classification contexts)
    drift_from_previous: 'FIRST HARDENING: the fire metaphor is replaced by CLASSIFICATION.
      nibbāna becomes a dhamma — an item in an ontological inventory. the dhammasaṅgaṇi opens
      with "katame dhammā asaṅkhatā? nibbānaṁ" — "what dhammas are unconditioned? nibbāna."
      this is a DEFINITION, not a pointer. the multiplicity of 33 epithets (SN 43) is replaced
      by a single category: asaṅkhata. the question shifts from "how do I get there?" to "what
      IS it?"

      '
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: madhyamaka
    meaning: 'nirvāṇa = saṃsāra. nāgārjuna argues that there is no distinction whatsoever
      between nirvāṇa and saṃsāra (MMK 25.19-20). the goal is not a separate realm but the
      same reality seen without conceptual proliferation (prapañca).

      '
    key_texts: ["mūlamadhyamakakārikā ch25"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 25.19 (lines 1244-1245)
      quote: na saṃsārasya nirvāṇāt kiṃcid asti viśeṣaṇam na nirvāṇasya saṃsārāt kiṃcid
        asti viśeṣaṇam
      context: '''there is no distinction whatsoever between saṃsāra and nirvāṇa. there is
        no distinction whatsoever between nirvāṇa and saṃsāra.'' the EQUATION. the early texts
        present nibbāna as the goal to be ATTAINED through practice. nāgārjuna presents nirvāṇa
        as what saṃsāra ALREADY IS when seen correctly. the method (attaining liberation)
        becomes a thesis (liberation is already the case).

        '
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 25.20 (lines 1247-1248)
      quote: nirvāṇasya ca yā koṭiḥ koṭiḥ saṃsaraṇasya ca na tayor antaraṁ kiṃcit
        susūkṣmam api vidyate
      context: '''the limit of nirvāṇa and the limit of saṃsāra — between them not even the
        subtlest difference exists.'' the ontological equation pushed to its logical endpoint.
        the fire metaphor is completely absent. this is THESIS-SHAPE language: a philosophical
        proposition, not a practice instruction.

        '
    corpus_count: ~440 (nirvāṇa in sanskrit mahāyāna)
    drift_from_previous: 'SECOND HARDENING (or DISSOLUTION): the classified "unconditioned
      reality" of abhidhamma is now EQUATED with conditioned reality. the distinction between
      goal and non-goal collapses. paradoxically, this is both the ultimate hardening (nirvāṇa
      becomes a philosophical thesis) and the ultimate softening (the rigid goal/non-goal
      distinction is dissolved). the fire metaphor would predict neither outcome: a fire that
      has gone out is simply gone — it is not "the same as" the fuel.

      '
  - period: 19th-21st century CE
    dating_confidence: high
    tradition: western reception / colonial
    meaning: 'nirvana = "annihilation" (schopenhauer), "heaven" (popular christianized reading),
      "nothingness" (existentialist reading), or "secular well-being" (secular buddhist reading).
      ALL of these import western categories onto a term that resists them.

      '
    key_texts: ["schopenhauer world as will", "rhys davids translations", "batchelor
      buddhism without beliefs"]
    citations: []
    corpus_count: n/a (reception, not canonical)
    drift_from_previous: 'COLONIAL OVERLAY: the western reception adds a FOURTH layer of drift.
      "annihilation" imports the christian anxiety about nothingness. "heaven" imports the
      christian eschatological framework. "nothingness" imports the existentialist problematic.
      "well-being" imports the therapeutic-secular framework. NONE of these capture the fire
      metaphor: a fire that goes out is not annihilated, is not in heaven, is not "nothing,"
      and is not "well." it simply ceases to burn. the DECOLONIZATION CHECKLIST (section II)
      recommends: keep nibbāna untranslated. closest gloss: "the going-out of the fires of
      craving, aversion, and delusion."

      '
  valence:
    buddhist_early: the goal — cessation of craving, pointed to through metaphor
    buddhist_abhidhamma: a classified reality — the one unconditioned dhamma
    buddhist_madhyamaka: not separate from saṃsāra — a way of seeing, not a place
    jain: liberation of the permanent jīva (soul) — fundamentally different meaning
    note: 'nibbāna is where the decolonization argument is most urgent. every english
      "translation" (extinction, blowing out, liberation, nirvana-as-heaven) carries foreign
      metaphysics. the fire metaphor works ONLY within its own cultural frame: vedic indian
      fire does not "go somewhere" when extinguished — it returns to its unmanifest state.
      the western question "where does the fire go?" is a category error, not a philosophical
      puzzle. MN 72 makes this explicit.

      '
  standard_references:
    pts_dictionary: 'nibbāna: going out, quenching, emancipation, the dying out of the
      three fires of rāga, dosa, moha'
    monier_williams: 'nirvāṇa: blowing out, extinction, cessation, complete happiness'
    diff_notes: 'PTS preserves the fire metaphor ("going out, quenching") AND adds
      "emancipation" — blending the metaphor with a soteriological gloss. MW gives "blowing
      out, extinction" — accurate but then adds "complete happiness" which imports a positive
      definition the early texts avoid. our dictionary insists: the early texts use POINTING
      language (33 epithets, fire simile, release-chain), NOT defining language. the abhidhamma
      shift to "asaṅkhata dhamma" is where definition begins. [!] FLAGGED — both PTS and MW
      reflect post-abhidhamma consolidation, not the early multiplicity of epithets.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: primary
    note: 'the H index tracks nibbāna''s drift: fire-metaphor (denominator) → classified
      reality (numerator)'


# ─────────────────────────────────────────────────────────────
# 2. ASANKHATA (the unconditioned / the unfabricated)
# ─────────────────────────────────────────────────────────────
asankhata:
  id: asankhata
  concept: the unconditioned / the unfabricated
  tier: primary
  family: ["nibbana", "nibbana_dhatu", "amata"]
  chapters: ["ch4"]
  semantic_field: ontology-soteriology
  forms:
    pali:
    - term: asaṅkhata
      grammar: adjective/neuter noun (a + saṅkhata, past participle of saṅkharoti)
      root: a-saṃ-kṛ (not put-together, not fabricated)
      note: 'unconditioned — grammatically a PAST PARTICIPLE used as adjective: "not
        fabricated." in early usage, it DESCRIBES nibbāna (nibbāna is asaṅkhata). in
        abhidhamma, asaṅkhata becomes a CATEGORY (asaṅkhata dhamma) — the adjective becomes
        a noun. this grammatical shift (adjective → noun) parallels the anattā drift
        (adjective → ontological claim).

        '
    sanskrit:
    - term: asaṃskṛta
      grammar: adjective/noun
      note: unconditioned — same drift into category in abhidharma
    chinese:
    - term: 無為
      pinyin: wúwéi
      translator: standard
      translation_choice_note: '''non-doing / non-fabrication'' — this is the SAME term as the
        daoist wúwéi. the chinese translation imports daoist connotations of effortless
        naturalness onto a buddhist technical term. this is translation-as-interpretation:
        asaṅkhata becomes "wuwei" and carries an entire chinese philosophical tradition with
        it. a decolonization point: chinese translators ALSO colonized buddhist terms, not
        only westerners.

        '
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'an ADJECTIVE applied to nibbāna — one of 33 epithets in SN 43. "asaṅkhata" is
      listed alongside amata (deathless), virāga (dispassion), taṇhākkhaya (destruction of
      craving), etc. it is NOT privileged above the other 32 synonyms. it is one way of
      POINTING, not THE definition.

      '
    key_texts: ["SN 43 asaṅkhata saṃyutta"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/kn/iti/vagga5/iti44_root-pli-ms.json
      reference: Iti 44:6.1
      quote: Ye etadaññāya padaṁ asaṅkhataṁ
      context: '''those who have known this unconditioned state'' — in Iti 44, asaṅkhata
        appears in verse as one of several descriptors. it is an ADJECTIVE modifying pada
        (state/footing), not a standalone noun. the verse uses asaṅkhata alongside other
        pointing-language.

        '
    corpus_count: ~150 (asaṅkhata in sutta piṭaka — mostly in SN 43)
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma
    meaning: 'asaṅkhata becomes THE definition of nibbāna. the dhammasaṅgaṇi asks: "katame
      dhammā asaṅkhatā? nibbānaṁ." the 33 synonyms of SN 43 are REDUCED to one category.
      asaṅkhata becomes a formal classification term — the fourth paramattha dhamma alongside
      citta, cetasika, rūpa.

      '
    key_texts: ["dhammasaṅgaṇi", "abhidhammattha saṅgaha"]
    citations: []
    corpus_count: ~30 (asaṅkhata in formal classification contexts)
    drift_from_previous: 'THE KEY HARDENING: from one-of-33-epithets to THE-defining-category.
      the early plurality of pointing-language is replaced by a single classificatory term.
      this is the method→thesis shift applied to the goal itself: instead of 33 ways of
      pointing at what cannot be defined, there is now ONE correct classification. the fire
      metaphor disappears; the ontological category remains.

      '
  valence:
    buddhist_early: one of many epithets — not privileged
    buddhist_abhidhamma: THE defining category — the fourth paramattha dhamma
    note: 'asaṅkhata is WHERE the hardening happens. the early texts give 33 different ways
      to point at nibbāna (SN 43). the abhidhamma selects ONE of these (asaṅkhata) and makes
      it THE category. the other 32 synonyms become subordinate. this selection process —
      choosing one descriptor and elevating it to definitional status — is the mechanism of
      drift.

      '
  standard_references:
    pts_dictionary: 'asaṅkhata: unconditioned, not put together, not arranged'
    diff_notes: 'PTS gives the grammatical sense correctly. our dictionary adds: in SN 43,
      asaṅkhata is ONE of 33 epithets; in abhidhamma, it becomes THE category. the PTS
      definition already reflects the post-abhidhamma privileging.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: numerator
    note: asaṅkhata as ontological category = definitional/system-register language


# ─────────────────────────────────────────────────────────────
# 3. VIMUTTI (liberation / release / freedom)
# ─────────────────────────────────────────────────────────────
vimutti:
  id: vimutti
  concept: liberation / release / freedom
  tier: primary
  family: ["nibbana", "viraga", "nibbida"]
  chapters: ["ch4"]
  semantic_field: soteriology
  forms:
    pali:
    - term: vimutti
      grammar: feminine noun (vi + mutti, from √muc, to release)
      root: vi-mukti (release, freeing)
      note: 'liberation — the EXPERIENTIAL term for what nibbāna IS. "vimutti" emphasizes
        the PROCESS of being freed, not the STATE that results. the distinction matters:
        vimutti = the releasing; nibbāna = the going-out.

        '
    - term: cetovimutti
      grammar: compound (ceto + vimutti)
      note: 'release of mind — liberation through concentration (samādhi). often paired with
        paññāvimutti.'
    - term: paññāvimutti
      grammar: compound (paññā + vimutti)
      note: release by wisdom — liberation through insight (paññā)
    - term: vimutto
      grammar: past participle (vimuccati)
      note: '''released'' — the arahat as "one who is released"'
    sanskrit:
    - term: vimukti
      grammar: feminine noun
      note: same as pāli — release, liberation
    chinese:
    - term: 解脫
      pinyin: jiětuō
      translator: standard
      translation_choice_note: '''untying-escaping'' — a semantic translation that preserves
        the process-sense. jiě = untie + tuō = escape/shed. better than english "liberation"
        which sounds like a political category.

        '
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the EXPERIENTIAL moment of release. the standard formula: "vimuttasmiṁ vimuttamiti
      ñāṇaṁ hoti — when released, there is knowledge: released!" (SN 22.59). vimutti is
      what the practitioner EXPERIENCES. it is practice-register language: you DO something
      (the path), and vimutti HAPPENS.

      '
    key_texts: ["SN 22.59", "MN 1", "AN 9.36"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:11.1-2
      quote: nibbindaṁ virajjati virāgā vimuccati vimuttasmiṁ vimuttamiti ñāṇaṁ hoti
      context: '''becoming disenchanted, one becomes dispassionate; through dispassion, one
        is released; when released, there is knowledge: released!'' the release-chain:
        nibbidā → virāga → vimutti → ñāṇa. vimutti is a MOMENT in a process, not a state
        to be classified. this is pure practice-register language.

        '
    corpus_count: ~800 (vimutti/vimutta across sutta piṭaka)
    drift_from_previous: null
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: abhidhamma / scholastic
    meaning: vimutti analyzed into types (cetovimutti, paññāvimutti, samayavimutti,
      asamayavimutti) and mapped onto path-stages
    key_texts: ["vibhaṅga", "visuddhimagga"]
    citations: []
    corpus_count: moderate
    drift_from_previous: 'SYSTEMATIZATION: the experiential moment of release becomes a
      classified TYPE (what kind of vimutti? temporary or permanent? by concentration or by
      wisdom?). the process becomes a taxonomy.

      '
  valence:
    buddhist: the experiential moment of liberation — the PRACTICE-REGISTER name for the goal
    note: 'vimutti vs nibbāna: vimutti emphasizes the PROCESS (being freed), nibbāna
      emphasizes the RESULT (the fires going out). in early texts, both appear together.
      in abhidhamma, nibbāna (as asaṅkhata) takes over as the formal term; vimutti becomes
      a subordinate classification.'
  standard_references:
    pts_dictionary: 'vimutti: release, deliverance, emancipation'
    diff_notes: PTS gives clear definition. no significant disagreement.
  index_contribution:
  - index: H
    chapter: ch4
    role: denominator
    note: vimutti as experiential release = practice-register language


# ─────────────────────────────────────────────────────────────
# 4. PARINIBBANA (final extinction / the buddha's passing)
# ─────────────────────────────────────────────────────────────
parinibbana:
  id: parinibbana
  concept: final extinction / the buddha's passing / complete going-out
  tier: primary
  family: ["nibbana", "nibbana_dhatu"]
  chapters: ["ch4"]
  semantic_field: soteriology-narrative
  forms:
    pali:
    - term: parinibbāna
      grammar: neuter noun (pari + nibbāna)
      note: 'complete/final nibbāna — the prefix pari- intensifies: "thoroughly extinguished."
        in early usage, applied to any arahat''s death. in later usage, becomes a quasi-proper
        noun for the BUDDHA''S death specifically.'
    - term: parinibbāyati
      grammar: verb (present indicative)
      note: '''finally goes out'' — the process'
    - term: parinibbuto
      grammar: past participle
      note: '''finally gone out'' — state of the arahat/buddha after death'
    sanskrit:
    - term: parinirvāṇa
      grammar: neuter noun
      note: 'in mahāyāna: the mahāparinirvāṇasūtra becomes an elaborate narrative. the
        simple cessation becomes a cosmic event with relics, earthquakes, and laments.'
    chinese:
    - term: 般涅槃
      pinyin: bānnièpán
      translator: standard (phonetic)
