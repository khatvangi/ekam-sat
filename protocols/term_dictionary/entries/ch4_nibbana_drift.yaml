# ─────────────────────────────────────────────────────────────
# 8. AMATA (the deathless / the immortal / nectar)
# ─────────────────────────────────────────────────────────────
amata:
  id: amata
  concept: the deathless / the immortal / nectar
  tier: primary
  family: ["nibbana", "asankhata", "viraga"]
  chapters: ["ch4"]
  semantic_field: soteriology
  forms:
    vedic:
    - term: amṛta
      grammar: neuter noun/adjective
      root: a-mṛta (not-dead, deathless)
      note: 'in vedic: the drink of immortality (soma = amṛta). the gods drink amṛta and
        become immortal. this is a SUBSTANCE (divine nectar). the buddhist usage retains
        the term but strips it of the substance-metaphysics.'
    pali:
    - term: amata
      grammar: neuter noun/adjective
      root: a-mata (not-dead)
      note: 'the deathless — one of the 33 epithets for nibbāna in SN 43. also used in MN 26:
        "amataṁ adhigataṁ" — "the deathless has been reached." the term is POINTER-LANGUAGE:
        it says what nibbāna is NOT (not-death), not what it IS.'
    - term: amatadvāra
      grammar: compound
      note: '''door to the deathless'' — nibbāna as something to be ENTERED (spatial metaphor)'
    sanskrit:
    - term: amṛta
      grammar: neuter noun
      note: same — but in mahāyāna, sometimes expanded into "amṛta-dharma" etc.
    chinese:
    - term: 甘露
      pinyin: gānlù
      translator: standard
      translation_choice_note: '''sweet dew'' — a remarkable chinese translation choice. NOT
        a phonetic transliteration. gānlù makes nibbāna sound POSITIVE (sweet, nourishing)
        rather than negative (cessation, extinction). the chinese translators were aware of the
        "annihilation" misreading and actively COUNTERED it by choosing a positive image.
        this is translation-as-interpretation in the opposite direction from english.

        '
    - term: 不死
      pinyin: bùsǐ
      translator: semantic alternative
      translation_choice_note: '''not-death'' — literal, preserving the negative pointer-language'
  temporal_strata:
  - period: ~1500-500 BCE
    dating_confidence: medium
    tradition: vedic
    meaning: the drink of immortality — soma = amṛta. a divine substance that confers
      deathlessness on the gods
    key_texts: ["ṛgveda"]
    citations: []
    corpus_count: frequent in vedic
    drift_from_previous: null
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'an epithet for nibbāna — "the deathless." the vedic substance-metaphysics is
      stripped: amata is not a drink, not a substance, not something you consume. it is a
      POINTER: nibbāna is not-death. but what IS it? the term deliberately refuses to say.

      '
    key_texts: ["SN 43", "MN 26", "SN 47.42"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn26_root-pli-ms.json
      reference: MN 26:18.1
      quote: amataṁ anuttaraṁ yogakkhemaṁ nibbānaṁ ajjhagamaṁ
      context: '''I reached the deathless, unsurpassed security from bondage, nibbāna.'' the
        buddha''s own description of his attainment. note: amata (deathless) and nibbāna appear
        TOGETHER — amata is an ADJECTIVE modifying nibbāna, not a separate thing. it points
        to one aspect: this is not-death.

        '
    corpus_count: ~100 (amata/amataṁ in sutta piṭaka)
    drift_from_previous: 'RECONTEXTUALIZATION: vedic amṛta = a substance (divine drink).
      buddhist amata = an epithet (pointer to nibbāna). the same word is used but the entire
      metaphysics is different: no substance, no immortal gods, no drinking. the buddha takes
      the vedic vocabulary and empties it of vedic content — the same pattern as brahma-
      (ch2) and tapas (ch2).

      '
  valence:
    vedic: divine substance — the drink of immortality
    buddhist: epithet/pointer — one of 33 ways of indicating nibbāna
    note: 'the chinese translation 甘露 (gānlù = "sweet dew") is evidence that translation
      is ALWAYS interpretation. the english "deathless" sounds neutral/negative. the chinese
      "sweet dew" sounds positive/nourishing. the pāli amata is NEITHER — it is a negation
      (a-mata = not-dead) that refuses to tell you what it IS.'
  standard_references:
    pts_dictionary: 'amata: deathless, immortal; ambrosia'
    monier_williams: 'amṛta: immortal, imperishable; nectar, ambrosia, soma'
    diff_notes: 'PTS gives "deathless, immortal; ambrosia" — the "ambrosia" preserves the
      vedic substance-sense that the buddhist usage strips. MW gives the full vedic range.
      our dictionary distinguishes: vedic amṛta = substance; buddhist amata = pointer.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: tracks hardening
    note: amata as pointer (early) → amata as quasi-realm (later) tracks the trajectory


# ─────────────────────────────────────────────────────────────
# 9. AGGI_NIBBANA (fire — the root metaphor for nibbāna)
# ─────────────────────────────────────────────────────────────
aggi_nibbana:
  id: aggi_nibbana
  concept: fire — the root metaphor for the going-out (nibbāna)
  tier: primary
  family: ["nibbana", "upadana"]
  chapters: ["ch4"]
  semantic_field: metaphor-soteriology
  forms:
    pali:
    - term: aggi
      grammar: masculine noun
      root: agni (fire)
      note: 'fire — in early buddhist usage, the THREE FIRES are rāga (craving), dosa
        (aversion), moha (delusion). nibbāna = the going-out of these three fires. the fire
        metaphor is THE root metaphor for the entire nibbāna concept. upādāna = fuel/clinging.
        nibbāna = fuelless/extinguished.

        '
    - term: aggi nibbuto
      grammar: phrase (fire extinguished)
      note: 'the fire-that-has-gone-out — the direct metaphorical basis for nibbāna.
        MN 72: the buddha asks where the fire "goes" when extinguished. vacchagotta
        correctly says it does not "go" anywhere.'
    - term: ādittapariyāya
      grammar: compound
      note: '''the fire sermon'' (SN 35.28 / Vin I 34) — the discourse on everything being
        on fire with craving. the entire sensory apparatus is BURNING; nibbāna is when the
        burning stops.'
    sanskrit:
    - term: agni
      grammar: masculine noun
      note: fire — vedic fire-god. the buddhist usage strips the divine personhood.
    chinese:
    - term: 火
      pinyin: huǒ
      translator: standard
      translation_choice_note: '''fire'' — straightforward'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the ROOT METAPHOR. the fire simile in MN 72 is the single most important
      passage for understanding nibbāna. the buddha does NOT define nibbāna. he uses the
      fire metaphor to show that the question "what IS nibbāna?" has the wrong grammar —
      just as "where did the fire GO?" has the wrong grammar. a fire that goes out does not
      "go" anywhere. it simply ceases to burn when its fuel is exhausted.

      DECOLONIZATION KEY: in vedic indian culture, fire was understood to return to its
      UNMANIFEST state when extinguished — not to "become nothing." richard gombrich has
      shown that the vedic understanding of fire is that it is ALWAYS present in potential
      and only MANIFESTS when fuel is supplied. when fuel is removed, fire returns to potential.
      this means nibbāna (fire going out) is NOT "annihilation" or "nothingness" — it is
      return to the unmanifest. the western misreading "nirvana = annihilation" imports a
      christian anxiety about nothingness onto a vedic metaphor that does not carry it.

      '
    key_texts: ["MN 72 aggivacchagotta", "SN 35.28 ādittapariyāya", "SN 22.53"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn72_root-pli-ms.json
      reference: MN 72:19.16
      quote: yo te ayaṁ purato aggi nibbuto so aggi ito katamaṁ disaṁ gato
      context: '''this fire that is extinguished before you — in what direction has it gone?''
        the buddha''s question to vacchagotta. the fire has gone out. vacchagotta says it does
        not "go" in any direction (east, west, north, south). the buddha then applies the same
        logic to the tathāgata after death: the question has the wrong grammar. you cannot ask
        "where did the fire go?" because going-out is not going-somewhere.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn72_root-pli-ms.json
      reference: MN 72:19.18
      quote: aggi tiṇakaṭṭhupādānaṁ paṭicca ajali tassa ca pariyādānā aññassa ca anupahārā
        anāhāro nibbutotveva saṅkhyaṁ gacchati
      context: '''the fire burned dependent on grass-and-wood fuel; when that is exhausted
        and nothing else is supplied, being fuelless, it is reckoned as extinguished.'' the
        MECHANISM: fire depends on upādāna (fuel/clinging). when upādāna is gone, the fire is
        gone. nibbāna IS the fuelless state. the word upādāna means BOTH "fuel" and "clinging"
        — the pun is structural, not accidental. clinging IS the fuel that keeps the fire
        of saṃsāra burning.

        '
    corpus_count: ~300 (aggi-terms in sutta piṭaka in soteriological contexts)
    drift_from_previous: null
  valence:
    vedic: fire as divine — agni is a god, fire is sacred
    buddhist: fire as METAPHOR for craving — the fires of rāga, dosa, moha
    note: 'the fire metaphor is the DECOLONIZATION KEY for ch4. every western misreading
      of nibbāna (annihilation, heaven, nothingness) fails because it misunderstands the
      fire metaphor. fire in vedic india does not become "nothing" when extinguished — it
      returns to unmanifest potential. the question "where does the fire go?" is shown to
      be a CATEGORY ERROR in MN 72. this category error is the same one made by every
      western translator who tries to say what nibbāna "is."

      '
  standard_references:
    pts_dictionary: 'aggi: fire'
    diff_notes: 'PTS gives bare "fire." our dictionary emphasizes the METAPHORICAL function:
      fire is THE root metaphor for nibbāna, and the cultural context of fire in vedic india
      determines its meaning.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: tracks hardening
    note: the fire metaphor is pure practice-register; its disappearance from later texts
      IS the hardening


# ─────────────────────────────────────────────────────────────
# 10. NIBBIDA (disenchantment / turning away / weariness)
# ─────────────────────────────────────────────────────────────
nibbida:
  id: nibbida
  concept: disenchantment / turning away / weariness with saṃsāra
  tier: primary
  family: ["viraga", "vimutti", "nibbana"]
  chapters: ["ch4"]
  semantic_field: soteriology
  forms:
    pali:
    - term: nibbidā
      grammar: feminine noun (nis + √vid, to find/know → disillusionment)
      root: nir-vid (to become disenchanted, to turn away)
      note: 'disenchantment — the FIRST stage in the release-chain: nibbidā → virāga →
        vimutti. often mistranslated as "revulsion" or "disgust" — both too strong and
        emotionally loaded. nibbidā is the moment when the fascination with conditioned
        existence FADES. not emotional rejection, but cognitive clarity.

        '
    sanskrit:
    - term: nirveda
      grammar: masculine noun
      note: same — disenchantment, weariness
    chinese:
    - term: 厭離
      pinyin: yànlí
      translator: standard
      translation_choice_note: '''weariness-leaving'' — yàn = weary/fed-up + lí = leave.
        the chinese ADDS the "leaving" component that the pāli does not explicitly contain.
        nibbidā is the disenchantment; the leaving (virāga) is the NEXT step. the chinese
        translation compresses two stages into one.'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the first step toward nibbāna. the formula: "evaṁ passaṁ ... nibbindati;
      nibbindaṁ virajjati; virāgā vimuccati" — "seeing thus ... one becomes disenchanted;
      being disenchanted, one becomes dispassionate; through dispassion, one is released."
      nibbidā is the TRIGGER: the moment when the practitioner sees the three characteristics
      (anicca, dukkha, anattā) and the enchantment with conditioned existence breaks.

      '
    key_texts: ["SN 22.59", "SN 35 (entire saḷāyatana saṃyutta)"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:11.1
      quote: evaṁ passaṁ bhikkhave sutavā ariyasāvako rūpasmimpi nibbindati
      context: '''seeing thus, the instructed noble disciple becomes disenchanted with form''
        — the beginning of the release-chain. nibbidā is triggered BY seeing things as they
        really are (yathābhūtaṁ). it is a cognitive shift, not an emotional reaction.

        '
    corpus_count: ~400 (nibbidā/nibbindati across sutta piṭaka)
    drift_from_previous: null
  valence:
    buddhist: the trigger for release — cognitive clarity about conditioned existence
    note: 'nibbidā is ALWAYS practice-register. it names what HAPPENS in the practitioner.
      no abhidhamma classification substantially changes this — nibbidā remains a
      functional/experiential term, unlike nibbāna which hardens into asaṅkhata.

      '
  standard_references:
    pts_dictionary: 'nibbidā: weariness, disgust, aversion'
    diff_notes: 'PTS gives "weariness, disgust, aversion" — "disgust" and "aversion" are
      WRONG. nibbidā is not paṭigha (aversion) or dosa (hatred). it is the FADING of
      fascination, not the arising of rejection. [!] FLAGGED — PTS''s "disgust" is a colonial
      mistranslation that makes the path sound emotionally negative rather than cognitively
      clarifying.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: denominator
    note: nibbidā as experiential trigger = pure practice-register language


# ─────────────────────────────────────────────────────────────
# 11. TANHA_KHAYA (destruction of craving — the early definition)
# ─────────────────────────────────────────────────────────────
tanha_khaya:
  id: tanha_khaya
  concept: destruction of craving — the early functional definition of nibbāna
  tier: primary
  family: ["nibbana", "viraga", "nirodha"]
  chapters: ["ch4"]
  semantic_field: soteriology
  forms:
    pali:
    - term: taṇhākkhaya
      grammar: compound (taṇhā + khaya)
      root: tṛṣṇā + kṣaya (craving + destruction/exhaustion)
      note: 'destruction of craving — the most FUNCTIONAL definition of nibbāna in the early
        texts. when the suttas DO define nibbāna (which is rare), they say: "yo taṇhākkhayo ...
        etaṁ nibbānaṁ" — "the destruction of craving ... that is nibbāna." this is a PROCESS
        definition (craving stops) not a STATE definition (nibbāna IS X).

        '
    - term: taṇhakkhayo
      grammar: nominative
      note: '''the destruction of craving'' — nominative case, used predicatively'
    sanskrit:
    - term: tṛṣṇākṣaya
      grammar: compound
      note: same — destruction of craving
    chinese:
    - term: 愛盡
      pinyin: àijìn
      translator: standard
      translation_choice_note: '''love/craving-exhausted'' — ài (愛) in buddhist chinese means
        craving (taṇhā), not love in the modern chinese sense. jìn = exhausted/finished.
        the chinese translation preserves the process-sense: craving is USED UP (like fuel).

        '
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the CLOSEST the early texts come to defining nibbāna. taṇhākkhaya is one of
      the 33 epithets in SN 43, but it is more than an epithet — it appears in the direct
      definition formula: "yo taṇhākkhayo virāgo nirodho nibbānaṁ" — "the destruction of
      craving, dispassion, cessation — that is nibbāna." unlike asaṅkhata (which classifies),
      taṇhākkhaya EXPLAINS: nibbāna happens when craving is destroyed.

      '
    key_texts: ["SN 43", "MN 26:19.5"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn26_root-pli-ms.json
      reference: MN 26:19.5
      quote: taṇhākkhayo virāgo nirodho nibbānaṁ
      context: '''the destruction of craving, dispassion, cessation — nibbāna.'' the four-
        term chain that is the closest to a definition. note: taṇhākkhaya comes FIRST — the
        process of craving-destruction is the primary descriptor. virāga (dispassion) and
        nirodha (cessation) follow. nibbāna is the last term — the summary-name for the
        entire process. the definition IS the process.

        '
    corpus_count: ~50 (taṇhākkhaya in sutta piṭaka — concentrated in SN 43 and doctrinal
      formulas)
    drift_from_previous: null
  valence:
    buddhist: the functional definition — nibbāna is what happens when craving stops
    note: 'taṇhākkhaya is ch4''s most important BASELINE term. it represents the earliest
      attempt to say what nibbāna IS — and it does so in PROCESS language (craving is
      destroyed), not CATEGORY language (nibbāna is the unconditioned). the drift from
      taṇhākkhaya to asaṅkhata is the drift from process to category, from practice to
      system, from method to thesis.'
  standard_references:
    pts_dictionary: 'taṇhākkhaya: destruction of craving'
    diff_notes: PTS gives clear definition. no disagreement.
  index_contribution:
  - index: H
    chapter: ch4
    role: denominator
    note: taṇhākkhaya as process-definition = practice-register language


# ─────────────────────────────────────────────────────────────
# 12. NIRODHA (cessation / stopping / the third noble truth)
# ─────────────────────────────────────────────────────────────
nirodha:
  id: nirodha
  concept: cessation / stopping / the third noble truth
  tier: primary
  family: ["nibbana", "tanha_khaya", "viraga"]
  chapters: ["ch4"]
  semantic_field: soteriology-ontology
  forms:
    pali:
    - term: nirodha
      grammar: masculine noun (ni + rodha, from √rudh, to stop/obstruct)
      root: ni-rudh (to cease, to stop)
      note: 'cessation — appears in THREE distinct registers: (1) the third noble truth:
        dukkha-nirodha (cessation of suffering); (2) dependent origination: the reverse chain
        (avijjā-nirodha → saṅkhāra-nirodha → ...); (3) nirodha-samāpatti: the attainment of
        cessation (a specific meditative state). the three uses represent different stages
        of the drift.

        '
    - term: nirodhasamāpatti
      grammar: compound
      note: '''attainment of cessation'' — a specific meditative state beyond the four jhānas
        and four formless attainments. this is the HARDENED form: cessation as an attainment
        to be entered.'
    - term: dukkhanirodha
      grammar: compound
      note: '''cessation of suffering'' — the third noble truth. the PRACTICE-REGISTER form.'
    sanskrit:
    - term: nirodha
      grammar: masculine noun
      note: cessation — same in both traditions
    chinese:
    - term: 滅
      pinyin: miè
      translator: standard
      translation_choice_note: '''extinction/cessation'' — also used for parinibbāna.
        the same character covers multiple pāli terms, creating ambiguity.'
    - term: 滅定
      pinyin: mièdìng
      translator: standard
      translation_choice_note: '''cessation-attainment'' — nirodha-samāpatti as a specific
        meditative state.'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the third noble truth: dukkhanirodha = the cessation of suffering. defined in
      SN 56.11 as "the complete fading-and-cessation of that very craving" (asesavirāga-
      nirodho). nirodha here is FUNCTIONAL: suffering STOPS because craving stops. it is not
      a PLACE or a STATE — it is the ending of a process.

      '
    key_texts: ["SN 56.11", "SN 12.1 (reverse chain)"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn56/sn56.11_root-pli-ms.json
      reference: SN 56.11:4.6-7
      quote: dukkhanirodhaṁ ariyasaccaṁ yo tassāyeva taṇhāya asesavirāganirodho cāgo
        paṭinissaggo mutti anālayo
      context: '''the noble truth of the cessation of suffering: the complete fading-and-
        cessation of that very craving, the giving up, relinquishment, release, non-reliance.''
        the DEFINITION of the third noble truth. nirodha is embedded in a chain of process-
        terms (virāga, cāga, paṭinissagga, mutti) — all practice-register.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn12/sn12.1_root-pli-ms.json
      reference: SN 12.1 (reverse chain)
      quote: avijjāya tveva asesavirāganirodhā saṅkhāranirodho
      context: '''with the remainderless fading-and-cessation of ignorance, formations cease.''
        the reverse dependent origination chain. each link''s nirodha follows from the previous
        link''s nirodha. this is PROCESS language: cessation as a chain reaction.

        '
    corpus_count: ~1500 (nirodha-terms across sutta piṭaka — extremely frequent)
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma / early scholastic
    meaning: 'nirodha-samāpatti becomes a specific attainment: the "attainment of cessation"
      beyond the four jhānas and four formless attainments. the early nirodha (functional
      cessation of suffering) acquires a second meaning (a specific meditative state to be
      entered and exited). the verb form shifts from "it ceases" to "one enters cessation."

      '
    key_texts: ["AN 9.36", "vibhaṅga"]
    citations: []
    corpus_count: ~80 (nirodha-samāpatti in sutta + abhidhamma)
    drift_from_previous: 'REIFICATION: the functional "cessation of suffering" (dukkha
      stops) becomes a SPECIFIC STATE (nirodha-samāpatti) that one ENTERS. the process
      becomes a place. "suffering ceases" → "I enter the cessation-attainment." this
      parallels the broader nibbāna drift: from process to state, from happening to place.

      '
  valence:
    buddhist: cessation — the third noble truth AND a specific meditative attainment
    note: 'nirodha shows the drift in microcosm. the early meaning (suffering stops) is
      pure process-language. the later meaning (cessation-attainment) is state-language.
      the shift from verb to noun, from happening to place, IS the hardening.

      '
  standard_references:
    pts_dictionary: 'nirodha: cessation, destruction, annihilation; dying out'
    diff_notes: 'PTS gives "cessation, destruction, annihilation" — "annihilation" is the
      colonial misreading again. nirodha is NOT annihilation (uccheda). the buddha explicitly
      rejects uccheda as a wrong view. nirodha is FUNCTIONAL cessation (craving stops,
      suffering stops), not ontological annihilation (something is destroyed). [!] FLAGGED —
      PTS''s "annihilation" imports the uccheda-vāda (annihilationism) that the buddha
      condemns.

      '
  index_contribution:
  - index: H
    chapter: ch4
    role: tracks hardening
    note: nirodha as process (early) → nirodha-samāpatti as state (later) tracks the drift
