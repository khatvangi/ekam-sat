      reference: SN 56.11:4.7
      quote: yo tassāyeva taṇhāya asesavirāganirodho cāgo paṭinissaggo mutti anālayo
      context: '''the complete fading-and-cessation of that very craving, the giving up,
        relinquishment, release, non-reliance.'' the definition of the third noble truth.
        virāga is embedded in the DEFINITION of dukkha-nirodha — cessation IS dispassion.
