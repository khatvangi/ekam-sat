# 6. VIRAGA (dispassion / fading away / detachment)
# ─────────────────────────────────────────────────────────────
viraga:
  id: viraga
  concept: dispassion / fading away / detachment
  tier: primary
  family: ["nibbana", "nibbida", "vimutti"]
  chapters: ["ch4"]
  semantic_field: soteriology
  forms:
    pali:
    - term: virāga
      grammar: masculine noun (vi + rāga)
      root: vi-raj (to fade, to become dispassionate)
      note: 'dispassion — literally "the fading of passion." one of the 33 epithets for
        nibbāna in SN 43, AND a stage in the release-chain (nibbidā → virāga → vimutti).
        it functions as BOTH pointer and process.'
    sanskrit:
    - term: virāga
      grammar: masculine noun
      note: same — dispassion
    chinese:
    - term: 離欲
      pinyin: líyù
      translator: standard
      translation_choice_note: '''leaving desire'' — semantic translation'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the approach to nibbāna. in the release-chain formula (SN 22.59, etc.):
      nibbidā → virāga → vimutti. virāga is what HAPPENS on the path — craving fades away.
      the third noble truth itself is defined as "asesavirāganirodho" — "the complete fading-
      and-cessation" (SN 56.11). virāga is PROCESS language: the fading of passion. not a
      state, not a classification, not a thing.

      '
    key_texts: ["SN 22.59", "SN 56.11", "SN 43"]
    citations:
