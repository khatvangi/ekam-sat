      quote: bandhanaṃ ced upādānaṃ sopādāno na badhyate / badhyate nānupādānaḥ kimavastho 'tha badhyate
      context: '''if grasping is bondage, then one WITH grasping is not bound; one WITHOUT grasping is not bound either —
        in what state, then, is one bound?'' the paradox exposes upādāna as without intrinsic nature: bondage cannot be located
        in the grasper, the grasping, or their relation.

        '
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 26 (line 1278)
      quote: tṛṣyamāṇa upādānam upādatte caturvidham
      context: '''the thirsting one grasps the four kinds of clinging.'' ch26 restates the dependent origination formula but
        within the madhyamaka framework — the chain operates conventionally while being ultimately empty.

        '
    corpus_count: 'upādāna: ~30+ in MMK/prasannapadā'
    drift_from_previous: 'from THERAPEUTIC MECHANISM (clinging/fuel that sustains the fire of becoming, to be abandoned) to
      PHILOSOPHICAL PARADOX (grasping that cannot be located in grasper or grasped). the early fire-metaphor (upādāna = fuel,
      nibbāna = extinguishing) becomes a formal analogy (agni-indhana) in nāgārjuna''s dialectical system. the register shifts
      from practice (let go of the fuel) to system (grasping has no intrinsic nature to let go of).

      '
  valence:
    buddhist: the mechanism by which craving generates continued existence — to be abandoned
    note: 'upādāna is both ''clinging'' and ''fuel.'' the fire metaphor: the aggregates are ''fuel-aggregates'' (upādānakkhandha).
      when the fuel is consumed, the fire goes out (nibbāna). this is the most complete integration of the fire metaphor with
      the anattā teaching.

      '
  standard_references:
