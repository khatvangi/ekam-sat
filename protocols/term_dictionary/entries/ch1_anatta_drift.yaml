

# ─────────────────────────────────────────────────────────────
# 1. ANATTA (not-self / no-self / selflessness)
# ─────────────────────────────────────────────────────────────
anatta:
  id: anatta
  concept: not-self / no-self / selflessness
  tier: primary
  family: ["atta_self", "khandha", "sakkayaditthi", "sunna"]
  chapters: ["ch1"]
  semantic_field: ontology-soteriology
  forms:
    pali:
    - term: anattā
      grammar: adjective (an + attā)
      root: a-ātman (not-self)
      note: 'THE central term. grammatically an ADJECTIVE — ''not-self'', applied to the five aggregates. NOT a noun meaning
        ''no-self.'' the grammatical form itself encodes the therapeutic sense.

        '
    - term: anatta
      grammar: in compounds (anattasaññā, anattalakkhaṇa)
      note: perception of not-self, characteristic of not-self
    sanskrit:
    - term: anātman
      grammar: masculine noun/adjective
      note: non-self — in mahāyāna, expands to nairātmya (selflessness as abstract noun)
    - term: nairātmya
      grammar: neuter abstract noun
      note: selflessness — NOMINALIZATION that converts the adjective into an ontological category
    - term: pudgalanairātmya
      grammar: compound
      note: selflessness of persons — the FIRST layer of anātman
    - term: dharmanairātmya
      grammar: compound
      note: selflessness of phenomena — the SECOND layer, mahāyāna extension
    chinese:
    - term: 無我
      pinyin: wúwǒ
      translator: standard
      translation_choice_note: '''no-self'' — the chinese ALREADY translates as ontological negation (wú = without/none).
        the therapeutic ''not-self'' sense is lost in translation. this is itself evidence of drift AT THE TRANSLATION LEVEL.

        '
    - term: 非我
      pinyin: fēiwǒ
      translator: rare alternative
      translation_choice_note: '''not-I/not-self'' — preserves the adjective sense better than 無我'
    jain:
    - term: anattā (NOT used)
      note: jains AFFIRM the ātman/jīva — anattā is contrastive, not shared
    gandhari:
    - term: aṇatma
      note: gandhari form — attested in manuscripts
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'anattā as ADJECTIVE applied to the five aggregates: ''form is not-self'' (rūpaṁ anattā). the teaching is DIAGNOSTIC:
      these aggregates do not behave as a self would (you cannot control them). it is NOT a claim that ''there is no self.''

      '
    key_texts: ["SN 22.59 anattalakkhaṇa", "SN 22.17", "MN 22 alagaddūpama"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:2.1-2.4
      quote: rūpaṁ bhikkhave anattā. rūpañca hidaṁ bhikkhave attā abhavissa nayidaṁ rūpaṁ ābādhāya saṁvatteyya
      context: 'the anattalakkhaṇa sutta (second discourse): ''form is not-self. IF form were self, form would not lead to
        affliction, and one could command: let my form be thus.'' the argument is PRAGMATIC: you cannot control it, therefore
        it is not your self. NOT: ''there is no self anywhere.''

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:7.1
      quote: sabbaṁ rūpaṁ netaṁ mama nesohamasmi na meso attāti evametaṁ yathābhūtaṁ sammappaññāya daṭṭhabbaṁ
      context: '''all form should be seen as it really is with right wisdom: this is not mine, I am not this, this is not
        my self.'' the triple formula — EACH clause is a negation of a specific identification, not a metaphysical denial.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:11.1-2
      quote: evaṁ passaṁ bhikkhave sutavā ariyasāvako rūpasmimpi nibbindati ... nibbindaṁ virajjati virāgā vimuccati
      context: 'the RESULT: ''seeing thus, the instructed noble disciple becomes disenchanted ... through disenchantment,
        becomes dispassionate; through dispassion, liberated.'' the PURPOSE of anattā is LIBERATION, not ontological truth-claiming.

        '
    corpus_count: ~3000+
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma / early scholastic
    meaning: anattā becomes one of the three characteristics (tilakkhaṇa) — formalized as universal truth, not just practical
      observation
    key_texts: ["abhidhamma classifications", "paṭisambhidāmagga"]
    citations: []
    corpus_count: ~50 (anātman/nairātmya in abhidhamma-era texts)
    drift_from_previous: 'FIRST HARDENING: anattā moves from practical diagnostic (applied to the five aggregates in meditation)
      to UNIVERSAL CHARACTERISTIC (one of three marks of all conditioned existence: anicca, dukkha, anattā). this is the beginning
      of the method→thesis shift. still therapeutically oriented, but now systematized.

      '
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: mahāyāna (madhyamaka, yogācāra)
    meaning: 'anātman/nairātmya expanded: (1) pudgalanairātmya (no-self of persons — the early teaching), (2) dharmanairātmya
      (no-self of phenomena — NEW). the early therapeutic observation becomes a comprehensive ontological framework.

      '
    key_texts: ["mūlamadhyamakakārikā", "yogācārabhūmi"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 13.8
      quote: śūnyatā sarvadṛṣṭīnāṃ proktā niḥsaraṇaṃ jinaiḥ yeṣāṃ tu śūnyatādṛṣṭis tān asādhyān babhāṣire
      context: '''emptiness is declared by the conquerors as the way out of all views. but those who hold emptiness as a VIEW
        are declared incurable.'' nāgārjuna''s self-aware warning: even śūnyatā/anattā can become a diṭṭhi if clung to as
        ontological truth.

        '
    corpus_count: ~127 (anātman/nairātmya in sanskrit mahāyāna)
    drift_from_previous: 'THE FULL DRIFT: therapeutic not-self → ontological no-self of persons → ontological no-self of ALL
      phenomena. the early teaching says "don''t identify with the aggregates." nāgārjuna says "no phenomenon has inherent
      existence." the scope expands from soteriological tool to comprehensive metaphysics. CRITICALLY: nāgārjuna HIMSELF warns
      against this drift (MMK 13.8).

      '
  valence:
    buddhist_early: therapeutic — diagnostic tool for disidentification from the aggregates
    buddhist_later: ontological — metaphysical claim about the nature of all reality
    jain: CONTRASTIVE — jains affirm the jīva/ātman
    hindu: CONTRASTIVE — vedānta affirms the ātman as identical with brahman
    note: 'the anattā → nairātmya drift is THE subject of ch1. every other term in this chapter supports this central trajectory.

      '
  standard_references:
    pts_dictionary: 'anattā: not self, without a self'
    monier_williams: 'anātman: not self, not the soul'
    diff_notes: 'PTS gives "not self, without a self" — preserving the adjective sense. MW gives "not self, not the soul"
      — ''soul'' is MW''s import (no pāli equivalent carries the Abrahamic substance-soul sense); reading is closer to the
      ontological interpretation. our dictionary insists: the PĀLI grammatical form (adjective, not noun) is evidence that
      the early teaching is ''not-self'' (applied to aggregates), not ''no-self'' (universal metaphysical claim). [!] FLAGGED
      — the adjective→noun shift in translations is itself the drift.

      '
  index_contribution:
  - index: H
    chapter: ch1
    role: primary
    note: 'the H index tracks this term''s drift: therapeutic (denominator) → ontological (numerator)'


# ─────────────────────────────────────────────────────────────
# 2. ATTA_SELF (self — the concept that anattā negates)
# ─────────────────────────────────────────────────────────────
atta_self:
  id: atta_self
  concept: self — the concept that anattā negates
  tier: primary
  family: ["anatta", "atman", "sakkayaditthi"]
  chapters: ["ch1", "ch2"]
  semantic_field: ontology
  forms:
    pali:
    - term: attā
      grammar: masculine noun
      note: 'the self-concept. in early suttas, attā appears in TWO registers: (1) conventional: ''attanā coday'' attānaṁ''
        (exhort yourself) — reflexive, no metaphysical weight. (2) metaphysical: ''eso me attā'' (this is my self) — the identification
        that anattā negates.

        '
    sanskrit:
    - term: ātman
      grammar: masculine noun
      note: see ch2 atman entry for full vedic→upanishadic trajectory
    chinese:
    - term: 我
      pinyin: wǒ
      translator: standard
      translation_choice_note: '''I/self'' — used in both conventional and metaphysical senses'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'attā in early suttas is the TARGET of the triple negation formula. ''na meso attā'' = ''this is not my self.''
      the buddha does NOT say ''attā does not exist'' — he says ''this [aggregate] is not attā.'' the distinction is between
      denying identification and denying existence.

      '
    key_texts: ["SN 22.59", "SN 22.17", "SN 22.125"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:6.7
      quote: etaṁ mama esohamasmi eso me attā
      context: 'the three identifications that anattā undoes: ''this is mine'' (ownership), ''I am this'' (identity), ''this
        is my self'' (metaphysical claim). each is a different LEVEL of identification.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.17_root-pli-ms.json
      reference: SN 22.17:1.3
      quote: yadanattā taṁ netaṁ mama nesohamasmi na meso attāti evametaṁ yathābhūtaṁ sammappaññāya daṭṭhabbaṁ
      context: '''what is not-self should be seen as: this is not mine, I am not this, this is not my self'''
    corpus_count: ~3000+ (attā as self-reference ubiquitous)
    drift_from_previous: null
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: madhyamaka / yogācāra
    meaning: 'ātman shifts from being the target of therapeutic disidentification to being the subject of DIALECTICAL DECONSTRUCTION.
      nāgārjuna shows that the buddhas teach neither ātman nor anātman — the pedagogical strategy itself is contextual. asaṅga
      rehabilitates ātman-language pragmatically (''ātmano buddhadharmaparipākaḥ'' = the self''s cultivation of buddha-dharmas).

      '
    key_texts: ["MMK ch18", "yogācārabhūmi"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 18.6 (line 774)
      quote: buddhair nātmā na cānātmā kaścid ity api deśitam
      context: '''by the buddhas, neither self nor non-self has been taught as anything whatsoever.'' this is the meta-linguistic
        move: ātman is no longer simply negated (as in the suttas) but recognized as a PEDAGOGICAL DESIGNATION that is itself
        empty.

        '
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 18.2 (line 762)
      quote: nirmamo nirahaṃkāraḥ śamād ātmātmanīnayoḥ
      context: '''free from "mine," free from "I-making," through the peace of both ātman and ātmanīna [what pertains to self].''
        the therapy targets ātma-graha (self-grasping), not ātman as a metaphysical entity.

        '
    - file: data/raw/sanskrit/mahayana/sa_asanga-yogacarabhumi.txt
      reference: yogācārabhūmi (line 163)
      quote: ātmano buddhadharmaparipākaḥ anuttarā ca samyaksaṃbodhiḥ saptamaṃ sthānam
      context: '''the self''s ripening of buddha-dharmas and unsurpassed perfect awakening — this is the seventh level.''
        ātman here = the practitioner''s OWN development. the term is rehabilitated for practical use within the bodhisattva
        path, no longer the target of negation.

        '
    corpus_count: 'ātman: ~200+ across MMK, yogācārabhūmi, abhidharmakośa'
    drift_from_previous: 'from THERAPEUTIC TARGET (the identification to be dropped: ''this is not my self'') to DIALECTICAL
      OBJECT (neither affirmed nor negated: ''buddhas teach neither ātman nor anātman'') to PRAGMATICALLY REHABILITATED TERM
      (used conventionally in bodhisattva cultivation). the trajectory: negation of identification → deconstruction of the
      negation itself → conventional re-use. the original PRACTICE register (drop the identification) is replaced by the SYSTEM
      register (neither-self-nor-non-self).

      '
  valence:
    buddhist: the target of therapeutic disidentification — NOT claimed to be non-existent
    note: 'the conventional vs metaphysical use of attā in pāli is crucial. the buddha uses attā conventionally (''exhort
      yourself'') throughout the canon. the negation targets the METAPHYSICAL identification (''this is my eternal self''),
      not the conventional pronoun.

      '
  standard_references:
    pts_dictionary: 'attā: self, soul; also reflexive pronoun'
    diff_notes: 'PTS correctly notes both uses. our dictionary emphasizes: the conventional use (reflexive) CONTINUES throughout
      the canon even as the metaphysical use is negated. the co-existence of both uses in the same texts is evidence that
      anattā ≠ "the self doesn''t exist."

      '
  index_contribution:
  - index: H
    chapter: ch1
    role: denominator
    note: attā-language in early suttas = experiential/release register


# ─────────────────────────────────────────────────────────────
# 3. KHANDHA (aggregate / heap / collection)
# ─────────────────────────────────────────────────────────────
khandha:
  id: khandha
  concept: aggregate / heap / collection
  tier: primary
  family: ["anatta", "atta_self", "namarupa"]
  chapters: ["ch1"]
  semantic_field: ontology-phenomenology
  forms:
    pali:
    - term: khandha
      grammar: masculine noun
      root: skandh (to mount, to climb) → 'trunk, bulk, heap'
      note: 'aggregate — the five constituents of experience: rūpa, vedanā, saññā, saṅkhāra, viññāṇa'
    - term: pañcupādānakkhandha
      grammar: compound
      note: five aggregates affected by clinging — the specific TARGET of the anattā analysis
    sanskrit:
    - term: skandha
      grammar: masculine noun
      note: aggregate — same five in abhidharma systems
    chinese:
    - term: 蘊
      pinyin: yùn
      translator: xuanzang
      translation_choice_note: '''collection/heap'' — xuanzang''s translation. kumārajīva used 陰 (yīn, ''shade/shadow'')'
    - term: 陰
      pinyin: yīn
      translator: kumārajīva
      translation_choice_note: '''shade/shadow'' — kumārajīva''s earlier translation, suggesting aggregates as coverings'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the five khandhas are the DOMAIN to which anattā is applied. ''form is not-self, feeling is not-self, perception
      is not-self, formations are not-self, consciousness is not-self.'' the khandhas are not denied — they are the FIELD
      of analysis.

      '
    key_texts: ["SN 22.59 anattalakkhaṇa", "SN 22 entire khandha saṃyutta"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/sn22.59_root-pli-ms.json
      reference: SN 22.59:2.1-5.1
      quote: rūpaṁ bhikkhave anattā ... vedanā anattā ... saññā anattā ... saṅkhārā anattā ... viññāṇaṁ anattā
      context: anattā applied systematically to each of the five aggregates — the complete formula
    corpus_count: thousands — SN 22 alone has 159 suttas on the khandhas
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma
    meaning: khandhas analyzed into ultimate constituents (paramattha dhamma) — from experiential description to ontological
      inventory
    key_texts: ["dhammasaṅgaṇi", "abhidhammattha saṅgaha"]
    citations: []
    corpus_count: ~307 (skandha in sanskrit mahāyāna)
    drift_from_previous: 'ANALYSIS → INVENTORY: the early khandha analysis = ''observe these five aspects of experience and
      see they are not-self.'' the abhidhamma khandha analysis = ''here is the complete inventory of ultimate realities classified
      by aggregate.'' the same framework becomes an ontological catalogue.

      '
  valence:
    buddhist: central — the domain of the anattā analysis
    note: 'the khandha framework is WHERE anattā is applied. the drift tracked: khandha as experiential field (early) → khandha
      as ontological inventory (abhidhamma) → khandha as items denied inherent existence (madhyamaka). each stage uses the
      same five categories for a different philosophical purpose.

      '
  standard_references:
    pts_dictionary: 'khandha: bulk, mass, collection, aggregate'
    monier_williams: 'skandha: shoulder, the trunk of a tree, a large branch'
    diff_notes: 'MW preserves the pre-philosophical meaning (tree trunk, branch). PTS gives the philosophical meaning (aggregate,
      collection). the shift from ''trunk/heap'' to ''component of experience'' is itself a significant semantic development
      within buddhist technical vocabulary.

      '
  index_contribution:
  - index: H
    chapter: ch1
    role: tracks hardening
    note: khandha as experiential field (early) → ontological inventory (abhidhamma)


