      quote: samaṇo khalu bho gotamo kammavādī kiriyavādī apāpapurekkhāro brahmaññāya pajāya
      context: '''the ascetic gotama is indeed a kammavādī (affirmer of karma), a kiriyavādī (affirmer of action''s efficacy),
        one who does not encourage evil, for the benefit of the brahmanical people.'' this is how a BRAHMIN describes the
        buddha — as a moral realist.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn2_root-pli-ms.json
      reference: DN 2:18.1
      quote: pūraṇo kassapo sandiṭṭhikaṁ sāmaññaphalaṁ puṭṭho samāno akiriyaṁ byākāsi
      context: '''pūraṇa kassapa, when asked about the fruits of asceticism, declared non-efficacy of action'''
    corpus_count: ~10 explicit kiriyavāda; akiriya ~5
    drift_from_previous: null
  valence:
    buddhist: 'AFFIRMED — the buddha is a kiriyavādī. this is CRITICAL for ch5: calling the buddha an "atheist" implies he
      is an akiriyavādī (one who denies moral causation). he is the OPPOSITE. he affirms karma, affirms moral agency, affirms
