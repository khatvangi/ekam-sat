      grammar: compound (a + kiriya + vāda)
      note: the doctrine of NON-efficacy — pūraṇa kassapa's position, REJECTED
    sanskrit:
    - term: kriyāvāda
      grammar: compound
      note: doctrine of action's efficacy
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the buddha is explicitly called a kiriyavādī (affirmer of action''s efficacy) — he ACCEPTS that what you do
      matters. pūraṇa kassapa''s akiriyavāda (nothing you do has consequences) is explicitly classified as wrong view.

      '
    key_texts: ["DN 2 sāmaññaphala", "DN 4 soṇadaṇḍa"]
    citations:
