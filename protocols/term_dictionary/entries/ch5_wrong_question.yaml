

# ─────────────────────────────────────────────────────────────
# 1. ISSARA (lord / creator / supreme controller)
# ─────────────────────────────────────────────────────────────
issara:
  id: issara
  concept: lord / creator / supreme controller
  tier: primary
  family: ["issariya", "issaranimmana", "katta", "nimmata", "vasavatti"]
  chapters: ["ch5", "ch2"]
  semantic_field: theology
  forms:
    vedic:
    - term: īśāna
      grammar: present participle → adjective/noun
      root: īś (to own, to rule, to be master)
      note: ruling — epithet applied to multiple gods (see ch2 issara_vedic)
    sanskrit:
    - term: īśvara
      grammar: masculine noun
      note: 'the lord — in nyāya-vaiśeṣika: efficient cause of the universe'
    pali:
    - term: issara
      grammar: masculine noun
      note: 'lord — appears in DN 1 formula: ''issaro kattā nimmātā'''
    chinese:
    - term: 自在
      pinyin: zìzài
      translator: standard
      translation_choice_note: '''self-existing/sovereign'' — captures the POSITIVE valence. 自在天 (zìzàitiān) = Maheśvara as
        heavenly being.

        '
    - term: 大自在天
      pinyin: dàzìzàitiān
      translator: xuanzang
      translation_choice_note: Maheśvara — the great sovereign lord, specific deity
    jain:
    - term: issara
      language: ardhamagadhi
      note: jains ALSO reject issaranimmāna (creation-by-a-lord) — parallel to buddhist rejection
  temporal_strata:
  - period: ~1500-1200 BCE
    dating_confidence: medium
    tradition: vedic
    meaning: epithet for powerful deities — NOT a supreme deity concept
    key_texts: ["ṛgveda"]
    citations:
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_2,033.09
      quote: īśānād asya bhuvanasya bhūrer
      context: the lord of this abundant world — applied to rudra (see ch2 issara_vedic for full citations)
    corpus_count: 20
    drift_from_previous: null
  - period: ~500-200 BCE
    dating_confidence: medium
    tradition: late upanishadic
    meaning: supreme lord identified with brahman — theistic vedānta developing
    key_texts: ["śvetāśvatara", "īśa"]
    citations:
    - file: data/raw/upanishads/primary/svetasvatara.txt
      reference: ŚU 3.2
      quote: sa īśvaraḥ paramātmā
      context: he is the lord, the supreme self
    corpus_count: 116
    drift_from_previous: 'ELEVATION: from generic epithet to supreme deity. this creates the theological position that buddhism
      will reject.

      '
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'issaranimmāna (creation by a lord) REJECTED as one of three wrong causation theories (AN 3.61). but issariya
      (sovereignty) RETAINED and applied positively. the rejection is SPECIFIC: creation-function denied, power-function affirmed.

      '
    key_texts: ["DN 1 brahmajāla", "AN 3.61 titthāyatana", "MN 101 devadaha"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn1_root-pli-ms.json
      reference: DN 1:2.5.2
      quote: ahamasmi brahmā mahābrahmā abhibhū anabhibhūto aññadatthudaso vasavattī issaro kattā nimmātā seṭṭho sajitā vasī
        pitā bhūtabhabyānaṁ
      context: 'brahmā''s self-description: ''I am brahmā, the great brahmā, unconquered, all-seeing, wielding power, lord,
        creator, maker, chief, victor, ruler, father of beings.'' the buddha presents this as DELUSION — brahmā is the FIRST
        being to arise in a new cosmic cycle and mistakes his priority for creatorship.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an3/an3.61_root-pli-ms.json
      reference: AN 3.61:1.6
      quote: yaṁ kiñcāyaṁ purisapuggalo paṭisaṁvedeti sukhaṁ vā dukkhaṁ vā adukkhamasukhaṁ vā sabbaṁ taṁ issaranimmānahetū
      context: '''whatever a person experiences — pleasant, painful, or neutral — all is caused by the lord''s creation.''
        this is ONE OF THREE wrong causation theories rejected in AN 3.61.

        '
    corpus_count: 24
    drift_from_previous: 'STRATEGIC REJECTION: the buddha does NOT argue against issara in the abstract. he argues against
      issaranimmāna as a CAUSATION THEORY. the argument is: if issaranimmāna is the cause of everything, then murderers murder
      because of issaranimmāna, which destroys moral agency. the rejection is ETHICAL, not metaphysical. this is the key ch5
      thesis: the "atheism" question misframes what the buddha actually does.

      '
  - period: ~600-700 CE
    dating_confidence: high
    tradition: buddhist systematic (dharmakīrti)
    meaning: īśvara refuted through logical argument — kartṛtva (creatorship) of a permanent being is incoherent
    key_texts: ["pramāṇavārttika"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_pramANavArttika_dharmakirti.txt
      reference: PV 3.333
      quote: nityasya puṃsaḥ kartṛtvaṃ nityān bhāvānatīndriyān
      context: '''creatorship of a permanent person over permanent, supersensible entities'' — dharmakīrti''s target: the
        logical incoherence of a permanent being acting as efficient cause'
    - file: data/raw/sanskrit/mahayana/sa_pramANavArttika_dharmakirti.txt
      reference: PV 4.46
      quote: valāt taveccheyamiti vyaktamīśvaraceṣṭitam
      context: '''you would want by force — this is clearly the activity of an īśvara'' — dharmakīrti identifies the fallacy
        of the lord''s volition (īśvara-ceṣṭita) as explanation'
    corpus_count: ~32 (īśvara in sanskrit mahāyāna — abhidharmakośa dominant)
    drift_from_previous: 'THE DRIFT CAPTURED: early buddhist position = ethical rejection of a causation theory ("if everything
      is the lord''s creation, morality is meaningless"). dharmakīrti''s position = LOGICAL refutation of creatorship as philosophically
      incoherent. the buddha never needed to prove the creator-lord doesn''t exist — he showed the moral consequences of the
      claim. dharmakīrti converts this into a formal issaranimmāna refutation against the metaphysical possibility. THIS IS
      THE HARDENING from therapeutic deferral to logical refutation that ch5 tracks.

      '
  valence:
    vedic: distributed epithet — not a supreme deity concept
    upanishadic: elevated — supreme lord, creator
    buddhist_early: SPLIT — creator rejected (issaranimmāna), sovereignty retained (issariya)
    buddhist_late: SYSTEMATICALLY REFUTED — dharmakīrti converts ethical rejection into logical argument
    jain: parallel rejection — no issaranimmāna (creation-by-a-lord)
    note: 'the four-stage trajectory (epithet → supreme lord → ethical rejection → logical refutation) IS the drift. ch5 shows
      that calling buddha "atheist" collapses all four stages into a single binary (theist/atheist) and loses the entire argument.

      '
  standard_references:
    pts_dictionary: 'issara: lord, ruler, master, chief'
    monier_williams: 'īśvara: able to do, master, lord, supreme being, god'
    diff_notes: 'PTS correctly gives POWER terms (lord, ruler, master, chief) — no "creator." MW adds "supreme being, god."
      the PTS-MW gap maps the pāli-sanskrit semantic range difference. our dictionary adds the temporal dimension: the buddhist
      rejection targets specifically the CAUSATION claim, not the power claim.

      '
  index_contribution:
  - index: H
    chapter: ch5
    role: numerator
    note: dharmakīrti's logical refutation = ontic/definitional language (hardening)
  - index: H
    chapter: ch5
    role: denominator
    note: AN 3.61's ethical argument = pragmatic/release-oriented language


# ─────────────────────────────────────────────────────────────
# 2. ISSARIYA (sovereignty / mastery / power)
# ─────────────────────────────────────────────────────────────
issariya:
  id: issariya
  concept: sovereignty / mastery / power
  tier: primary
  family: ["issara", "vasavatti"]
  chapters: ["ch5"]
  semantic_field: theology-soteriology
  forms:
    sanskrit:
    - term: aiśvarya
      grammar: neuter noun
      root: īśvara + -ya (abstract suffix)
      note: lordship, sovereignty, lordly power — one of the six lordly qualities (ṣaḍ-aiśvarya)
    pali:
    - term: issariya
      grammar: neuter noun
      note: sovereignty, mastery — POSITIVELY RETAINED in buddhist usage
    chinese:
    - term: 自在
      pinyin: zìzài
      translator: standard
      translation_choice_note: '''self-existing/sovereign'' — note: same character used for both issara and issariya'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: sovereignty, mastery — applied POSITIVELY to the tathāgata and liberated beings
    key_texts: ["various sutta references"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn1_root-pli-ms.json
      reference: DN 1:2.5.2
      quote: vasavattī issaro
      context: 'in brahmā''s self-description, vasavattī and issaro appear TOGETHER. the buddhist critique targets kattā nimmātā
        (creator-maker) but NOT vasavattī issaro (power-wielding lord). the split is IN the text itself.

        '
    corpus_count: moderate
    drift_from_previous: null
  valence:
    buddhist: RETAINED — sovereignty/mastery is a positive quality, unlike creation
    note: 'the issara/issariya split is the KEY lexical evidence for ch5. the buddhist position is NOT "the lord has no power"
      but "the lord is not the creator." power (issariya) is affirmed; creatorship (kattā nimmātā) is denied. standard "atheist"
      framing misses this entirely.

      '
  standard_references:
    pts_dictionary: 'issariya: sovereignty, mastery, domination'
    diff_notes: 'PTS gives only positive meanings. no "creation" sense. this supports the split thesis: issariya is a different
      concept from issaranimmāna.

      '
  index_contribution:
  - index: SI
    chapter: ch5
    role: engagement
    note: retention of issariya = engagement with power/sovereignty concept


# ─────────────────────────────────────────────────────────────
# 3. ISSARANIMMANA (creation by a lord / theistic creation)
# ─────────────────────────────────────────────────────────────
issaranimmana:
  id: issaranimmana
  concept: creation by a lord / theistic creation
  tier: primary
  family: ["issara", "katta", "nimmata"]
  chapters: ["ch5"]
  semantic_field: theology
  forms:
    pali:
    - term: issaranimmāna
      grammar: compound noun (tappurisa)
      note: creation by a lord — the SPECIFIC claim that is rejected
    - term: issaranimmānahetu
      grammar: compound (issaranimmāna + hetu)
      note: '''having a creator-lord as cause'' — the causation theory AN 3.61 refutes'
    sanskrit:
    - term: īśvaranirmāṇa
      grammar: compound
      note: creation by the lord
    chinese:
    - term: 自在所作
      pinyin: zìzàisuǒzuò
      translator: standard
      translation_choice_note: '''made by the sovereign one'' — semantic translation'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: the claim that a supreme being created the world and determines all experience — REJECTED
    key_texts: ["AN 3.61 titthāyatana", "MN 101 devadaha", "DN 24 pāṭika"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an3/an3.61_root-pli-ms.json
      reference: AN 3.61:1.6
      quote: sabbaṁ taṁ issaranimmānahetū
      context: '''all that is caused by issaranimmāna (creation-by-a-lord)'' — one of three rejected causation theories'
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an3/an3.61_root-pli-ms.json
      reference: AN 3.61:4.4-6.7
      quote: tenahāyasmanto pāṇātipātino bhavissanti issaranimmānahetu
      context: 'the buddha''s reductio: ''then murderers will be murderers because of issaranimmāna (creation-by-a-lord).''
        if issaranimmāna is the cause of ALL experience, then morality becomes meaningless — there is no personal responsibility.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn101_root-pli-ms.json
      reference: MN 101:22.5
      quote: sace bhikkhave sattā issaranimmānahetu sukhadukkhaṁ paṭisaṁvedenti
      context: '''if beings experience pleasure and pain because of issaranimmāna (creation-by-a-lord)'' — conditional used
        to show the consequence'
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn24_root-pli-ms.json
      reference: DN 24:2.14.3
      quote: santi bhaggava eke samaṇabrāhmaṇā issarakuttaṁ brahmakuttaṁ ācariyakaṁ aggaññaṁ paññapenti
      context: '''there are some ascetics and brahmins who declare that origins are from a lord (issarakutta), from brahmā
        (brahmakutta)'' — DN 24 lists theistic creation as one view among many.

        '
    corpus_count: ~15 explicit occurrences across canon
    drift_from_previous: null
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: abhidharma / madhyamaka
    meaning: 'the issaranimmāna critique shifts from ETHICAL refutation (if a lord created everything, moral responsibility
      collapses) to LOGICAL refutation (a permanent cause cannot produce impermanent effects). vasubandhu includes īśvara
      alongside puruṣa and pradhāna as rejected causal theories. the abhidharmakośabhāṣya echoes DN 1''s brahmā-delusion passage
      in a scholastic context.

      '
    key_texts: ["abhidharmakośabhāṣya", "visuddhimagga", "laṅkāvatāra sūtra"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_vasubandhu-abhidharmakozabhASya.txt
      reference: abhidharmakośabhāṣya (line 6501)
      quote: pratyayebhyo bhāvā upajāyante na punaḥ sarvasyaiva jagataḥ īśvarapuruṣapradhānādikaṃ kāraṇamiti
      context: '''things arise from conditions, not from a single cause such as īśvara, puruṣa, pradhāna, etc.'' the ethical
        refutation of AN 3.61 is replaced by a LOGICAL refutation: dependent origination vs. single-cause theories. the rejection
        is now part of a systematic exclusion of all non-conditioned causation.

        '
    - file: data/raw/sanskrit/mahayana/sa_vasubandhu-abhidharmakozabhASya.txt
      reference: abhidharmakośabhāṣya (line 3734)
      quote: ahamasmin brahmā īśvaraḥ kartā nirmātā sraṣṭā sṛjaḥ pitṛbhūto bhūtānāmi
      context: 'vasubandhu quotes the brahmā self-delusion passage (cf. DN 1:2.5.2) in a scholastic context. the narrative
        of brahmā''s mistaken self- identification as creator is preserved but reframed as a logical error in causation theory,
        not just a doxographic report.

        '
    - file: data/raw/pali_commentary/visuddhimagga_buddhaghosa.txt
      reference: visuddhimagga (line 9542)
      quote: na issaranimmānādito hoti; ito pana hotī
      context: 'buddhaghosa: ''suffering does not come from issaranimmāna etc.; it comes from THIS [dependent origination].''
        the visuddhimagga uses issaranimmāna as a stock counter-example when establishing paṭiccasamuppāda — the term is now
        a STANDARD FOIL, not a live doctrinal opponent.

        '
    corpus_count: 'īśvara as cause: ~20 in abhidharmakośabhāṣya; issaranimmāna: ~5 in visuddhimagga'
    drift_from_previous: 'from ETHICAL refutation (AN 3.61: if issaranimmāna, then murderers murder by the lord''s will —
      moral agency collapses) to LOGICAL refutation (abhidharmakośa: a permanent cause cannot produce impermanent effects)
      to STANDARD FOIL (visuddhimagga: issaranimmāna as the stock alternative to paṭiccasamuppāda). the shift: from engaging
      a live doctrinal opponent → excluding a logical impossibility → invoking a standardized counter-example.

      '
  valence:
    buddhist: REJECTED — but rejection is ethical (undermines moral agency), not metaphysical (no proof the creator-lord doesn't
      exist)
    note: 'issaranimmāna is the PRECISE target of the buddhist critique. not issara (power), not issariya (sovereignty) —
      specifically the CREATION claim (nimmāna). the compound itself is the evidence: the buddhist language engineers a term
      that isolates the specific claim being rejected.

      '
  standard_references:
    pts_dictionary: 'issaranimmāna: not a separate entry (found under issara and nimmāna)'
    diff_notes: 'the compound is NOT a PTS headword — it appears only in context. this is evidence that standard dictionaries
      treat it as ad hoc rather than as a technical term. our dictionary elevates it to a primary entry because it IS the
      technical term for what the buddha rejects.

      '
  index_contribution:
  - index: H
    chapter: ch5
    role: tracks hardening
    note: early = ethical rejection (AN 3.61); later = logical refutation (dharmakīrti)


# ─────────────────────────────────────────────────────────────
# 4. AVYAKATA (undeclared / unanswered / set aside)
# ─────────────────────────────────────────────────────────────
avyakata:
  id: avyakata
  concept: undeclared / unanswered / set aside
  tier: primary
  family: ["ditthi", "sassatavada"]
  chapters: ["ch5"]
  semantic_field: epistemology
  forms:
    pali:
    - term: avyākata
      grammar: past participle (a + vi + ā + kṛ)
      root: a-vyākṛta (not explained, not declared)
      note: undeclared — the famous 'unanswered questions' the buddha SET ASIDE
    - term: abyākata
      grammar: variant spelling
      note: same term, alternate orthography in some manuscripts
    sanskrit:
    - term: avyākṛta
      grammar: past participle
      note: undeclared
    chinese:
    - term: 無記
      pinyin: wújì
      translator: standard
      translation_choice_note: '''not-recorded/not-designated'' — semantic translation capturing the ''set aside'' sense'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'questions the buddha REFUSED TO ANSWER — not because he couldn''t, but because answering either way would reinforce
      a wrong framework. the refusal is THERAPEUTIC, not evasive.

      '
    key_texts: ["MN 63 cūḷamāluṅkya", "SN 44.7-8", "SN 16.12"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn44/sn44.8_root-pli-ms.json
      reference: SN 44.8:1.6
      quote: etampi kho vaccha abyākataṁ mayā
      context: '''this too, vaccha, is undeclared by me'' — the buddha''s formula for setting aside a question'
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn16/sn16.12_root-pli-ms.json
      reference: SN 16.12:1.8
      quote: evampi kho āvuso abyākataṁ bhagavatā
      context: '''even this was undeclared by the blessed one'''
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn63_root-pli-ms.json
      reference: MN 63:2.3
      quote: sassato loko tipi asassato loko tipi antavā loko tipi anantavā loko tipi taṁ jīvaṁ taṁ sarīran tipi aññaṁ jīvaṁ
        aññaṁ sarīran tipi
      context: 'the ten (or fourteen) undeclared questions: is the world eternal? not eternal? finite? infinite? is the jīva
        the same as the body? different? does the tathāgata exist after death? not exist? both? neither? — ALL set aside.

        '
    corpus_count: ~30-40 explicit abyākata/avyākata occurrences
    drift_from_previous: null
  - period: ~200 BCE - 200 CE
    dating_confidence: medium
    tradition: abhidhamma / early scholastic
    meaning: avyākata reinterpreted from 'set aside' to 'indeterminate' (morally neutral) — a DIFFERENT technical meaning
    key_texts: ["abhidhamma classification system"]
    citations: []
    corpus_count: ~50 (avyākṛta in abhidharma classifications)
    drift_from_previous: 'SEMANTIC BIFURCATION: avyākata splits into TWO unrelated technical meanings: (1) the original "undeclared
      questions" (soteriological), (2) "morally indeterminate" in abhidhamma classification (systematic). the same term now
      means both "the buddha refused to answer" AND "neither wholesome nor unwholesome." this bifurcation is itself evidence
      of the method→thesis drift ch3 tracks.

      '
  valence:
    buddhist_early: therapeutic — refusing to answer IS the teaching
    buddhist_later: technical — classified category in abhidhamma
    note: 'avyākata is the MOST IMPORTANT term for ch5''s thesis. the buddha''s SILENCE on metaphysical questions is not ignorance
      or evasion — it is a deliberate therapeutic strategy. "is the buddha an atheist?" is itself an avyākata question: answering
      it either way misses the point.

      '
  standard_references:
    pts_dictionary: 'avyākata: indeterminate, not designated, unexplained'
    diff_notes: 'PTS lists "indeterminate" first — the abhidhamma sense — ahead of "unexplained" — the sutta sense. our dictionary
      reverses the priority: the sutta sense (therapeutic silence) is primary, the abhidhamma sense (moral classification)
      is derived. the PTS ordering itself reflects the drift from therapeutic to systematic.

      '
  index_contribution:
  - index: H
    chapter: ch5
    role: denominator
    note: the avyākata strategy = release-oriented language (refusing to harden into position)
  - index: H
    chapter: ch5
    role: tracks hardening
    note: later tradition's discomfort with silence → drives the hardening toward explicit refutation


# ─────────────────────────────────────────────────────────────
# 5. NATTHIKA (nihilist / one who denies / nāstika)
# ─────────────────────────────────────────────────────────────
natthika:
  id: natthika
  concept: nihilist / one who denies / nāstika
  tier: primary
  family: ["ditthi", "sassatavada"]
  chapters: ["ch5"]
  semantic_field: doxography
  forms:
    pali:
    - term: natthika
      grammar: adjective (natthi + ka)
      note: '''one who says there is not'' — the nihilist position'
    - term: natthikavāda
      grammar: compound
      note: nihilist doctrine
    sanskrit:
    - term: nāstika
      grammar: adjective/noun
      note: '''one who says na asti (it does not exist)'' — denier of vedic authority in brahmanical usage'
    chinese:
    - term: 斷見
      pinyin: duànjiàn
      translator: standard
      translation_choice_note: '''annihilation-view'' — semantic translation'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: one who denies the efficacy of giving, sacrifice, and karma — a specific doctrinal position the buddha ALSO rejects
    key_texts: ["MN 60 apaṇṇaka", "DN 2 sāmaññaphala"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn60_root-pli-ms.json
      reference: MN 60:5.2
      quote: natthi dinnaṁ natthi yiṭṭhaṁ natthi hutaṁ natthi sukatadukkaṭānaṁ kammānaṁ phalaṁ vipāko
      context: 'the natthika formula: ''there is no giving, no sacrifice, no offering; there is no fruit or result of good
        or bad actions; there is no this world, no other world; no mother, no father.'' the TOTAL denial position.

        '
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn60_root-pli-ms.json
      reference: MN 60:9.5
      quote: dussīlo purisapuggalo micchādiṭṭhi natthikavādo
      context: '''an immoral person with wrong view, a nihilist'' — natthikavāda classified as micchādiṭṭhi (wrong view)'
    corpus_count: ~20-30
    drift_from_previous: null
  - period: ~200-600 CE
    dating_confidence: medium
    tradition: madhyamaka / yogācāra
    meaning: 'nāstika hardens from the specific buddhist rejection of karma-denial into a doxographic label classifying schools
      that deny vedic authority, substance, or conventional reality. candrakīrti uses it to classify those who deny both existence
      AND non-existence as categories. asaṅga warns that one who denies the substance (vastu) underlying designations becomes
      "the chief nāstika" (pradhāno nāstiko) — excluded from the saṅgha.

