# 12. PUBBAKAMMA (past karma / prior action as sole cause)
# ─────────────────────────────────────────────────────────────
pubbakamma:
  id: pubbakamma
  concept: past karma / prior action as sole cause
  tier: primary
  family: ["karma", "issaranimmana"]
  chapters: ["ch5"]
  semantic_field: soteriology
  forms:
    pali:
    - term: pubbakamma
      grammar: compound (pubba + kamma)
      note: past action — specifically the DETERMINISTIC claim that all present experience is caused by past karma
    - term: pubbekatahetu
      grammar: compound (pubbe + kata + hetu)
      note: '''having a past-done cause'' — the causation theory (jain position)'
    sanskrit:
    - term: pūrvakarman
      grammar: compound
      note: prior action
    chinese:
    - term: 宿業
      pinyin: sùyè
      translator: standard
      translation_choice_note: '''former karma'' — semantic translation'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'the claim that ALL present experience is determined by past karma. REJECTED as one of three wrong causation
      theories (alongside issaranimmāna and ahetuappaccaya). notably, the buddha ACCEPTS that past karma is ONE cause among
      many — he rejects only the DETERMINISTIC version.

      '
    key_texts: ["AN 3.61 titthāyatana", "MN 101 devadaha"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an3/an3.61_root-pli-ms.json
      reference: AN 3.61:1.4
      quote: sabbaṁ taṁ pubbekatahetū
      context: '''all that is caused by past action'' — one of three rejected causation theories'
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn101_root-pli-ms.json
      reference: MN 101:2.5
      quote: sabbaṁ taṁ pubbekatahetu
      context: 'jain/nigaṇṭha version: ''everything one experiences is because of past action'''
    corpus_count: ~20
    drift_from_previous: null
  - period: ~200-500 CE
    dating_confidence: medium
    tradition: abhidharma / yogācāra
    meaning: 'pūrvakarman (past karma) is integrated into the systematic five-fruit classification. it no longer names a wrong
      causation THEORY (the determinist claim the buddha rejects in AN 3.61) but becomes a technical element in karma-result
      taxonomy: niṣyandaphala (outflow-fruit) is defined as ''subsequent results following through similarity with pūrvakarman.''

      '
    key_texts: ["abhidharmakośa ch2", "yogācārabhūmi"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_asanga-yogacarabhumi.txt
      reference: yogācārabhūmi (line 754)
      quote: pūrvakarmasādṛśyena vā paścātphalānuvartanatā tanniṣyandaphalam
      context: '''through similarity with past karma, subsequent results follow — that is the outflow-fruit (niṣyandaphala).''
        pūrvakarman is now a TECHNICAL COMPONENT in a five-fold fruit classification, not a wrong causation theory to be refuted.

        '
    - file: data/raw/sanskrit/mahayana/sa_candrakIrti-prasannapada.txt
      reference: prasannapadā on MMK 17 (line 3079)
      quote: pūrvakarmaphalahetuko na syāt
      context: 'candrakīrti argues: if karma could be destroyed by the path of seeing, then the fruits of karma for the āryas
        would not be ''caused by past karma-fruit'' (pūrvakarmaphalahetuka). the concept is now embedded in a philosophical
        debate about karmic continuity, not about determinism vs. free will.

        '
    corpus_count: ~10 in abhidharmakośa/yogācārabhūmi
    drift_from_previous: 'from REJECTED DETERMINISTIC THEORY (AN 3.61: ''everything is caused by past karma'' = wrong) to
      TECHNICAL COMPONENT in systematic karma-result taxonomy (yogācārabhūmi: past karma as the basis for niṣyandaphala).
      the ETHICAL critique (determinism undermines moral agency) is replaced by SCHOLASTIC INTEGRATION (past karma as one
      factor in a five-fold fruit classification). the original rejection is forgotten — the concept is neutralized and absorbed
      into the system.

      '
  valence:
    buddhist: 'REJECTED as total explanation, ACCEPTED as partial cause. the buddha''s middle position: past karma is ONE
      factor, but present intention also matters. this nuance is crucial for ch5 — the same structure (partial acceptance,
      total claim rejected) applies to issaranimmāna.

      '
    jain: CENTRAL — all present experience is caused by past karma. tapas burns it off.
    note: 'AN 3.61 places pubbekatahetu, issaranimmāna, and ahetuappaccaya in PARALLEL — three equally wrong total-causation
      theories. the buddha rejects all three with the SAME argument. this parallelism is the structural backbone of ch5.

      '
  standard_references:
    pts_dictionary: 'pubbakamma: former action'
    diff_notes: 'PTS gives neutral definition. our dictionary specifies: the DETERMINISTIC version (sabbaṁ taṁ pubbekatahetu)
      is what''s rejected.'
  index_contribution:
  - index: SI
    chapter: ch5
    role: both
    note: rejects deterministic version (opposition) while accepting past karma as one cause (engagement)


# ─────────────────────────────────────────────────────────────
# 13. KIRIYAVADA (the doctrine that actions have consequences)
# ─────────────────────────────────────────────────────────────
kiriyavada:
  id: kiriyavada
  concept: the doctrine that actions have consequences
  tier: primary
  family: ["karma", "natthika"]
  chapters: ["ch5"]
  semantic_field: soteriology
  forms:
    pali:
