      '
  index_contribution:
  - index: SI
    chapter: ch2
    role: opposition
    note: buddhist critique of animal sacrifice = opposition to vedic ritual
  - index: SI
    chapter: ch2
    role: engagement
    note: retention of yañña vocabulary (even with new meaning) = continued engagement


# ─────────────────────────────────────────────────────────────
# 5. KARMA (action / deed / moral causation)
# ─────────────────────────────────────────────────────────────
karma:
  id: karma
  concept: action / deed / moral causation
  tier: primary
  family: ["samsara", "moksha", "yajna"]
  chapters: ["ch2", "ch5"]
