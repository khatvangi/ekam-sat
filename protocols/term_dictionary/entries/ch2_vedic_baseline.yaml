

# ─────────────────────────────────────────────────────────────
# 1. BRAHMAN (the sacred / the absolute / the priestly)
# ─────────────────────────────────────────────────────────────
brahman:
  id: brahman
  concept: the sacred / the absolute / the priestly
  tier: primary
  family: ["atman", "brahmana_true", "tevijja"]
  chapters: ["ch2", "ch5"]
  semantic_field: theology
  forms:
    vedic:
    - term: bráhman
      grammar: neuter noun
      root: bṛh (to grow, to expand)
      note: sacred utterance, mantra-force — NOT the absolute, NOT a deity
    - term: brahmā
      grammar: masculine nominative
      note: used as epithet; brahmāṇas pati (lord of sacred utterance) is a distinct deity
    - term: brāhmaṇa
      grammar: masculine noun
      note: one who possesses brahman (sacred-utterance knowledge); ritual specialist
    sanskrit:
    - term: brahman
      grammar: neuter noun
      note: the absolute, cosmic ground (upanishadic development)
    - term: brahmā
      grammar: masculine noun
      note: the deity, creator-brahmā (distinct from neuter brahman)
    pali:
    - term: brahma
      grammar: noun
      note: 'context-dependent: cosmic principle vs prefix meaning ''sublime'''
    - term: brahmā
      grammar: proper noun
      note: the deity in buddhist cosmology — mahābrahmā
    - term: brāhmaṇa
      grammar: masculine noun
      note: brahmin priest; ALSO reinterpreted as 'true brahmin' (ethical sense)
    chinese:
    - term: 梵
      pinyin: fàn
      translator: standard across translators
      translation_choice_note: phonetic transliteration preserving the vedic root
    - term: 梵天
      pinyin: fàntiān
      translator: standard
      translation_choice_note: brahmā + celestial realm — specifically the deity
    - term: 婆羅門
      pinyin: póluómén
      translator: standard
      translation_choice_note: phonetic transliteration of brāhmaṇa
    jain:
    - term: brahma
      language: ardhamagadhi
      note: used but peripheral to jain soteriology
    gandhari:
    - term: brahma
      note: standard form attested in manuscripts
  temporal_strata:
  - period: ~1500-1200 BCE
    dating_confidence: medium
    tradition: vedic
    meaning: sacred utterance, mantra-force, the power inherent in ritual speech
    key_texts: ["ṛgveda"]
    citations:
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_1,003.05
      quote: upa brahmāṇi vāghataḥ
      context: come toward the sacred utterances — plural, referring to hymns
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_1,018.03
      quote: rakṣā ṇo brahmaṇas pate
      context: protect us, lord of brahman (= lord of sacred utterance, a deity)
    corpus_count: 355
    drift_from_previous: null
  - period: ~800-500 BCE
    dating_confidence: medium
    tradition: upanishadic
    meaning: the absolute reality, cosmic ground of being, identical with ātman
    key_texts: ["bṛhadāraṇyaka", "chāndogya", "māṇḍūkya"]
    citations:
    - file: data/raw/upanishads/primary/brhadaranyaka.txt
      reference: BU 1.4.10
      quote: ahaṃ brahmāsmi
      context: 'the great equation: I am brahman — self = absolute'
    - file: data/raw/upanishads/primary/brhadaranyaka.txt
      reference: BU 2.3.6
      quote: dve vāva brahmaṇo rūpe | mūrtaṃ caivāmūrtaṃ ca
      context: 'brahman has two forms: embodied and disembodied'
    corpus_count: 786
    drift_from_previous: 'MASSIVE semantic expansion: mantra-force → cosmic absolute. the ritual utterance becomes the ground
      of all being. neuter brahman (impersonal absolute) distinguished from masculine brahmā (creator deity) — a distinction
      that becomes crucial for the buddhist response.

      '
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'brahmā = deity in cosmology (retained but DEMOTED — thinks himself eternal but is deluded). brahma- prefix =
      ''sublime'' (brahmavihāra, brahmacariya — positively retained). brāhmaṇa = reinterpreted as ethical status, not birth.

      '
    key_texts: ["DN 1 brahmajāla", "DN 11 kevaddha", "DN 13 tevijja"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn1_root-pli-ms.json
      reference: DN 1:2.5.2
      quote: 'ahamasmi brahmā mahābrahmā abhibhū anabhibhūto aññadatthudaso vasavattī issaro kattā nimmātā seṭṭho sajitā vasī
        pitā bhūtabhabyānaṁ

        '
      context: 'brahmā''s self-description — "I am brahmā, the great brahmā, unconquered, lord, creator, maker, father of
        beings." the buddha presents this as DELUSION, not truth. note: this passage contains issaro kattā nimmātā — the exact
        formula ch5 tracks.

        '
    corpus_count: 454
    drift_from_previous: 'STRATEGIC TRIFURCATION: the buddha does three distinct things: (1) demotes brahmā from absolute
      to cosmological being (2) retains brahma- prefix for highest ethical qualities (3) redefines brāhmaṇa from birth-status
      to ethical achievement. this is not simple rejection — it is selective appropriation.

      '
  - period: ~5th century CE
    dating_confidence: high
    tradition: theravāda commentary
    meaning: brahmā as category in systematic cosmology; brahmavihāra as formal meditation technique
    key_texts: ["visuddhimagga IX"]
    citations:
    - file: data/raw/pali_commentary/visuddhimagga.txt
      reference: Vism ch.9 (brahmavihāraniddeso)
      quote: '[brahmavihāra systematization]'
      context: brahmavihāra codified into specific meditation procedure with stages, objects, and results
    corpus_count: ~50+ (brahman-references in buddhist systematic texts)
    drift_from_previous: 'systematization: brahmavihāra moves from ethical orientation to codified meditation technique with
      prescribed objects and stages. the method-register language increases.

      '
  valence:
    vedic: sacred — mantra-force, the power of ritual speech
    upanishadic: supreme — the absolute, ground of being, identical with ātman
    buddhist: SPLIT — deity (demoted), prefix (affirmed as 'sublime'), brāhmaṇa (reinterpreted as ethical)
    jain: peripheral — not central to jain metaphysics
    note: 'the buddhist treatment is NEITHER rejection NOR acceptance but STRATEGIC REINTERPRETATION. brahman-as-absolute
      is ignored (never directly argued against in early suttas). brahmā-as-deity is retained but demoted. brahma-as-adjective
      (''sublime'') is fully embraced.

      '
  standard_references:
    pts_dictionary: 'brahma: the supreme being, a brahmin, holy, sacred'
    monier_williams: 'brahman: n. the one self-existent Spirit, the Absolute'
    wisdomlib: 'Brahma: 47 definitions across hinduism, buddhism, jainism'
    diff_notes: 'PTS CONFLATES neuter brahman (absolute) with masculine brahmā (deity). this conflation is itself evidence
      of drift — in pāli, the vedic/upanishadic distinction between neuter-absolute and masculine-deity has partially collapsed,
      making the buddhist strategic reinterpretation harder to see. our dictionary maintains the distinction because it matters
      for the stance index. [!] FLAGGED DISAGREEMENT WITH PTS.

      '
  index_contribution:
  - index: SI
    chapter: ch2
    role: engagement
    note: brahmavihāra, brahmacariya = vedic terminology positively retained
  - index: SI
    chapter: ch2
    role: opposition
    note: brahmā-as-creator in DN 1 = explicit vedic stance challenged


# ─────────────────────────────────────────────────────────────
# 2. ATMAN (self / vital principle / the absolute subject)
# ─────────────────────────────────────────────────────────────
atman:
  id: atman
  concept: self / vital principle / the absolute subject
  tier: primary
  family: ["anatta", "brahman", "khandha", "sakkayaditthi"]
  chapters: ["ch2", "ch1"]
  semantic_field: ontology
  forms:
    vedic:
    - term: ātman
      grammar: masculine noun
      root: at (to breathe) or an (to breathe)
      note: breath, vital force, essential self — NOT yet transcendent subject
    sanskrit:
    - term: ātman
      grammar: masculine noun
      note: the eternal self, identical with brahman (upanishadic)
    - term: anātman
      grammar: masculine noun (negation)
      note: non-self, selflessness (buddhist philosophical term)
    - term: nairātmya
      grammar: neuter abstract noun
      note: selflessness (yogācāra/madhyamaka technical term)
    pali:
    - term: attā
      grammar: masculine noun
      note: self — the target of anattā negation
    - term: anattā
      grammar: adjective/noun
      note: not-self (therapeutic) → no-self (ontological) — THE ch1 drift
    chinese:
    - term: 我
      pinyin: wǒ
      translator: standard
      translation_choice_note: self/I — used in both affirmative (ātman) and negative (anātman) contexts
    - term: 無我
      pinyin: wúwǒ
      translator: standard
      translation_choice_note: no-self — standard translation of anātman/anattā
    - term: 神我
      pinyin: shénwǒ
      translator: xuanzang
      translation_choice_note: spirit-self — xuanzang's rendering emphasizing the metaphysical claim
    jain:
    - term: jīva
      language: ardhamagadhi
      note: CONTRASTIVE — jains AFFIRM the self (jīva). NOT equivalent to ātman but parallel concept.
    - term: ātman
      language: sanskrit (jain philosophical)
      note: jains accept ātman with finite spatial extent (vs. brahmanical infinite ātman)
    gandhari:
    - term: atma
      note: standard gandhari form
    - term: aṇatma
      note: gandhari negative form
  temporal_strata:
  - period: ~1500-1200 BCE
    dating_confidence: medium
    tradition: vedic
    meaning: breath, vital force, the animating principle in living beings
    key_texts: ["ṛgveda"]
    citations:
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_1,115.01
      quote: sūrya ātmā jagatas tasthuṣaś ca
      context: the sun is the ātman of all that moves and stands — cosmic vital principle
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_10,016.03
      quote: sūryaṁ cakṣur gacchatu vātam ātmā
      context: let the eye go to the sun, the ātman to the wind — funeral hymn, ātman = breath
    corpus_count: 26
    drift_from_previous: null
  - period: ~800-500 BCE
    dating_confidence: medium
    tradition: upanishadic
    meaning: the eternal conscious subject, invariant witness, identical with brahman
    key_texts: ["bṛhadāraṇyaka", "chāndogya", "taittirīya", "kaṭha"]
    citations:
    - file: data/raw/upanishads/primary/chandogya.txt
      reference: CU 6.8.7
      quote: tat tvam asi śvetaketo
      context: thou art that — ātman = brahman, the great equation
    - file: data/raw/upanishads/primary/brhadaranyaka.txt
      reference: BU 4.4.25
      quote: ajaro 'maro 'mṛto 'bhayaḥ
      context: unaging, immortal, deathless, fearless — attributes of the liberated ātman
    corpus_count: 1422
    drift_from_previous: 'RADICAL ELEVATION: from 26 occurrences (breath/vital force) to 1,422 (central philosophical concept).
      ātman becomes THE concept around which upanishadic philosophy organizes. the shift from "breath" to "absolute subject"
      is the foundational metaphysical innovation that buddhism will later negate.

      '
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'attā = the self-concept that is negated. anattā = not-self as therapeutic instruction (early stratum) hardening
      into no-self as ontological claim (later stratum). see ch1 for detailed drift.

      '
    key_texts: ["SN 22 khandha saṃyutta", "MN 22 alagaddūpama"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn22/
      reference: SN 22.11
      quote: rūpaṁ, bhikkhave, anattā atītānāgataṁ
      context: form is not-self, whether past, future, or present — applied to all five aggregates
    corpus_count: 3000
    drift_from_previous: 'DIRECT NEGATION of the upanishadic ātman. but critically, buddha argues against the UPANISHADIC
      ātman (eternal subject), not the VEDIC ātman (breath). the buddhist critique presupposes the upanishadic elevation.
      without the upanishadic development, there would be nothing to negate.

      '
  - period: ~400-700 CE
    dating_confidence: high
    tradition: mahāyāna systematic
    meaning: 'anātman/nairātmya becomes dual: pudgalanairātmya (no-self of persons) + dharmanairātmya (no-self of phenomena)'
    key_texts: ["madhyamakakārikā", "yogācārabhūmi"]
    citations:
    - file: data/raw/sanskrit/mahayana/sa_nAgArjuna-mUlamadhyamakakArikA.txt
      reference: MMK 18
      quote: '[ātmavāda refutation chapter]'
      context: nāgārjuna systematically refutes all possible ātman theories
    corpus_count: ~200+ (ātman in MMK, yogācārabhūmi, abhidharmakośa — extensively discussed)
    drift_from_previous: 'SYSTEMATIC EXPANSION: not-self of persons (the early teaching) extended to not-self of all phenomena.
      the therapeutic instruction becomes a comprehensive ontological framework. this is method→thesis drift in its philosophical
      dimension.

      '
  valence:
    vedic: natural — breath, vital force (descriptive, not philosophical)
    upanishadic: supreme — identical with brahman, the highest truth
    buddhist: NEGATED — but the negation itself evolves from therapeutic to ontological
    jain: AFFIRMED — jīva/ātman affirmed as real but finite (contrastive with both vedānta and buddhism)
    note: 'the four-way valence is crucial: vedic (descriptive) → upanishadic (metaphysical affirmation) → buddhist (negation)
      → jain (qualified affirmation). each position presupposes knowledge of the others.

      '
  standard_references:
    pts_dictionary: 'attā: self, soul [PTS''s term — we use ''self'' not ''soul'']'
    monier_williams: 'ātman: the breath, the soul, the principle of life and sensation'
    wisdomlib: 'Atman: 47 definitions'
    diff_notes: 'monier-williams correctly notes "breath" as primary meaning but lists it alongside "soul" without marking
      the temporal shift. our dictionary insists on temporal stratification: RV ātman (breath) ≠ upanishadic ātman (absolute
      self). this is not pedantic — the buddhist negation targets the latter, not the former.

      '
  index_contribution:
  - index: SI
    chapter: ch2
    role: engagement
    note: buddha engages with the upanishadic ātman concept (not the vedic one)
  - index: H
    chapter: ch1
    role: denominator
    note: attā-language in early suttas = experiential register (release-oriented)


# ─────────────────────────────────────────────────────────────
# 3. RTA (cosmic order / truth / law → dharma)
# ─────────────────────────────────────────────────────────────
rta:
  id: rta
  concept: cosmic order / truth / law → dharma
  tier: primary
  family: ["veda", "yajna", "karma"]
  chapters: ["ch2"]
  semantic_field: cosmology
  forms:
    vedic:
    - term: ṛta
      grammar: neuter noun
      root: ṛ (to move, to rise)
      note: cosmic order, truth, natural law, ritual propriety
    - term: ṛtasya
      grammar: genitive
      note: of ṛta — extremely common in RV
    sanskrit:
    - term: dharma
      grammar: masculine noun
      root: dhṛ (to hold, to support)
      note: law, duty, cosmic order — replaces ṛta in post-vedic discourse
    pali:
    - term: dhamma
      grammar: masculine noun
      note: 'multiple senses: teaching, truth, phenomenon, cosmic law, mental quality'
    chinese:
    - term: 法
      pinyin: fǎ
      translator: standard across all translators
      translation_choice_note: 'fǎ covers ALL senses of dhamma — teaching, phenomena, cosmic law. this polysemy is itself
        evidence of how much semantic weight the term accumulated through drift.

        '
    jain:
    - term: dhamma
      language: ardhamagadhi
      note: used with similar range of meaning as in buddhism
    gandhari:
    - term: dharma
      note: standard gandhari form
  temporal_strata:
  - period: ~1500-1200 BCE
    dating_confidence: medium
    tradition: vedic
    meaning: cosmic order, truth, natural regularity, ritual propriety — the fundamental structuring principle
    key_texts: ["ṛgveda"]
    citations:
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_1,001.08
      quote: rājantam adhvarāṇāṁ gopām ṛtasya dīdivim
      context: agni as guardian of ṛta — ṛta governs sacrifice and cosmos
    - file: data/raw/vedic/rgveda_aufrecht_gretil.txt
      reference: RV_1,002.08
      quote: ṛtena mitrāvaruṇāv ṛtāvṛdhāv ṛtaspṛśā
      context: mitra-varuṇa strengthened by ṛta, touching ṛta — guardians of cosmic order
    corpus_count: 775
    drift_from_previous: null
  - period: ~800-500 BCE
    dating_confidence: medium
    tradition: upanishadic
    meaning: ṛta DISAPPEARS — replaced by dharma (law/duty) and satya (truth)
    key_texts: ["bṛhadāraṇyaka"]
    citations:
    - file: data/raw/upanishads/primary/brhadaranyaka.txt
      reference: BU [dharma passages]
      quote: '[75 dharma occurrences in BU, 0 ṛta as cosmic order]'
      context: dharma replaces ṛta as the organizing concept for cosmic and moral law
    corpus_count_rta: 0
    corpus_count_dharma: 75
    drift_from_previous: 'LEXICAL REPLACEMENT: ṛta (775× in RV) vanishes from philosophical discourse, replaced by dharma.
      this is not just a word change — ṛta is impersonal cosmic regularity; dharma carries the additional sense of duty, ethical
      obligation, and eventually (in buddhism) the buddha''s teaching itself. the replacement OPENS semantic space that buddhism
      will fill.

      '
    corpus_count: ~30 (ṛta in later vedic — declining as dharma takes over)
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'dhamma = polysemous: (1) the buddha''s teaching, (2) cosmic truth/law, (3) mental/physical phenomena (in abhidhamma
      sense), (4) ethical quality. the polysemy is itself the product of drift — one word accumulates the semantic weight
      that ṛta, satya, and dharma previously distributed.

      '
    key_texts: ["DN, MN, SN, AN — ubiquitous"]
    citations:
    - file: data/raw/pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/
      reference: SN 56.11 (dhammacakkappavattana)
      quote: dhammacakkam pavattitam appativattiyam
      context: the wheel of dhamma set in motion, irreversible — dhamma as teaching/truth
    corpus_count: ubiquitous — tens of thousands
    drift_from_previous: 'SEMANTIC EXPLOSION: dharma/dhamma becomes the most overloaded term in buddhism. it simultaneously
      means: the buddha''s teaching, cosmic truth, individual phenomena (in abhidhamma), and ethical quality. this polysemy
      is the product of centuries of semantic accumulation from ṛta → dharma → dhamma.

      '
  valence:
    vedic: foundational — the structuring principle of cosmos and ritual
    upanishadic: REPLACED by dharma — shift from cosmic regularity to moral/ontological law
    buddhist: APPROPRIATED — dhamma becomes the buddha's own teaching and cosmic truth simultaneously
    jain: parallel — dhamma used similarly as cosmic-ethical principle
    note: 'the ṛta → dharma → dhamma trajectory is one of the most complete semantic transformations in indian intellectual
      history. a term for impersonal cosmic regularity becomes a term for a specific teacher''s soteriological program.

      '
  standard_references:
    pts_dictionary: 'dhamma: nature, condition, quality, thing, idea, phenomenon, truth, teaching'
    monier_williams: 'dharma: that which is established, law, duty, justice, virtue, religion'
    diff_notes: 'neither PTS nor MW captures the ṛta → dharma trajectory. PTS treats dhamma as if it always had its buddhist
      range of meaning. MW treats dharma as primarily hindu-legal. our dictionary shows the historical sequence: ṛta (cosmic
      order) → dharma (duty/law) → dhamma (teaching + phenomena + truth). the polysemy of dhamma is the RESULT of accumulating
      the semantic weight of ṛta + dharma + satya.

      '
  index_contribution:
  - index: SI
    chapter: ch2
    role: engagement
    note: dhamma appropriates the semantic space of ṛta — this is engagement, not opposition


