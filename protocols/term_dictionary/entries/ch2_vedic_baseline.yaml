    upanishadic: metaphorical — cosmos-as-sacrifice
    buddhist: ETHICIZED — animal sacrifice critiqued, true sacrifice = ethical relinquishment
    jain: REJECTED — ahiṃsā (non-violence) directly opposes animal sacrifice
  standard_references:
