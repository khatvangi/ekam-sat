    tradition: visuddhimagga (buddhaghosa)
    meaning: 'kammaṭṭhāna is REPURPOSED as ''meditation subject.'' buddhaghosa codifies 40 kammaṭṭhāna: 10 kasiṇa, 10 asubha,
