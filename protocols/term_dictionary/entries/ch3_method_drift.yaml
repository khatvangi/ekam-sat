

# ─────────────────────────────────────────────────────────────
# 1. SATI (mindfulness / recollection / awareness)
# ─────────────────────────────────────────────────────────────
sati:
  id: sati
  concept: mindfulness / recollection / awareness
  tier: primary
  family: ["jhana", "samadhi", "vipassana", "bhavana"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: sati
      grammar: feminine noun (√sar, to remember)
      root: smṛti (memory/recollection)
      note: 'sati is etymologically ''remembering'' — but in the suttas it means present-moment AWARENESS, not memorization.
        the root meaning shifts from ''recall'' to ''attend.'' later traditions re-systematize it into formal categories (four
        foundations, etc.)

        '
    - term: satimā
      grammar: 'adjective (possessive: ''having mindfulness'')'
      note: 'used in the key formula: ātāpī sampajāno satimā'
    - term: satipaṭṭhāna
      grammar: compound (sati + upaṭṭhāna = establishing of mindfulness)
      note: the four foundations — body, feelings, mind, dhammas
    sanskrit:
    - term: smṛti
      grammar: feminine noun
      note: 'in brahmanical usage: ''memory, tradition, remembered text'' (as opposed to śruti = ''heard/revealed''). buddhist
        usage shifts to ''present-moment awareness.'' in yogācāra: becomes a mental factor (caitasika) with precise definition
        — the drift from practice to category.

        '
    - term: smṛtyupasthāna
      grammar: compound
      note: = satipaṭṭhāna — foundations of mindfulness
    chinese:
    - term: 念
      pinyin: niàn
      translator: standard across translators
      translation_choice_note: 'niàn means both ''think of/remember'' AND ''mindfulness.'' the character 心 (heart-mind) +
        今 (now) = present-heartedness. this is one case where chinese PRESERVES the practice sense better than english ''mindfulness''
        (which sounds passive/observational).

        '
    - term: 四念處
      pinyin: sì niàn chù
      translator: standard
      translation_choice_note: '''four foundations of mindfulness'' — the systematized form'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'sati as FUNCTIONAL practice — what you DO when you sit: ''ātāpī sampajāno satimā, vineyya loke abhijjhādomanassaṁ''
      (diligent, clearly comprehending, mindful, removing greed and discontent regarding the world). sati REMOVES defilements,
      it doesn''t categorize mental states.

      '
    citations:
    - reference: MN 10:3.2
      quote: kāye kāyānupassī viharati ātāpī sampajāno satimā
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn10_root-pli-ms.json
      context: the satipaṭṭhāna formula — sati as verb-like practice
    - reference: SN 56.11:2.4
      quote: majjhimā paṭipadā tathāgatena abhisambuddhā
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn56/sn56.11_root-pli-ms.json
      context: sati appears as sammāsati in the eightfold path — PART of a practice, not a standalone system
    drift_from_previous: n/a — this is the baseline
    corpus_count: ~773 (sati-terms in sutta piṭaka)
  - period: ~3rd c BCE - 1st c CE
    dating_confidence: medium
    tradition: abhidhamma / early scholastic
    meaning: 'sati becomes a MENTAL FACTOR (cetasika) in the abhidhamma system. defined categorically: ''the characteristic
      of remembering'' (saraṇalakkhaṇā), ''the function of not forgetting'' (asammussanarasā), ''the manifestation of guarding''
      (ārakkhapaccupaṭṭhānā). the four-aspect analysis template replaces the practice description.

      '
    citations:
    - reference: Visuddhimagga line 1084
      quote: saraṇalakkhaṇā sati, asammussanarasā, ārakkhapaccupaṭṭhānā
      file: pali_commentary/visuddhimagga.txt
      context: buddhaghosa applies lakkhaṇa-rasa-paccupaṭṭhāna formula — sati is now an OBJECT to be analyzed
    drift_from_previous: 'FROM: ''be mindful'' (instruction to practitioner) TO: ''mindfulness HAS these characteristics''
      (definition of mental factor). the practitioner disappears; the category remains.

      '
    corpus_count: ~2117 (sati in visuddhimagga + commentary)
  - period: ~4th-5th c CE
    dating_confidence: high
    tradition: yogācāra / mahāyāna scholastic
    meaning: 'smṛti becomes one of five ''object-determining'' mental factors (pañca viṣayaniyata-caitasika) in asaṅga''s
      system. fully categorical — defined by its relationship to other mental factors, not by what the practitioner does.

      '
    citations:
    - reference: Yogācārabhūmi (Asaṅga)
      quote: bodhisattvasya dhyānapāramitāyā gotraliṅgāni
      file: sanskrit/mahayana/sa_asanga-yogacarabhumi.txt
      context: dhyāna/smṛti embedded in pāramitā system — categorical framework
    drift_from_previous: 'FROM: individual mental factor in theravāda abhidhamma TO: element in bodhisattva training matrix.
      the drift continues from category to SYSTEM OF CATEGORIES.

      '
    corpus_count: ~2117 (sati in visuddhimagga — buddhaghosa's systematization)
  valence:
    buddhist: affirmed — central practice term
    vedic: cognate but different sense (smṛti = remembered tradition, textual memory)
    jain: parallel (smṛti in jain yoga = recollection of past lives)
  standard_references:
    pts_dictionary: memory, recognition, consciousness ... 'one of the cardinal faculties'
    monier_williams: 'smṛti: memory, remembrance, tradition'
    wisdomlib: mindfulness, awareness; a mental factor that keeps the mind on its object
    diff_notes: 'PTS and wisdomlib both FLATTEN the temporal strata — listing ''mindfulness'' as if it''s a single stable meaning.
      the early sense (active practice of attending) and the later sense (categorized mental factor) are presented as one.
      THIS IS THE METHOD-DRIFT that ch3 documents.

      '
  index_contribution:
    MHI_register: practice → system
    collocational_markers:
    - bhaveti
    - viharati
    - pajānāti
    - yathābhūtaṃ
    drift_direction: practice instruction → mental factor category


# ─────────────────────────────────────────────────────────────
# 2. JHANA (meditative absorption / meditation)
# ─────────────────────────────────────────────────────────────
jhana:
  id: jhana
  concept: meditative absorption / meditation
  tier: primary
  family: ["sati", "samadhi", "vipassana", "bhavana"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: jhāna
      grammar: neuter noun (√jhā/jhāyati, to meditate/burn)
      root: dhyāna
      note: 'etymologically connected to both ''meditation'' and ''burning'' (jhāpeti). the suttas preserve both senses —
        meditative absorption AND burning away of defilements. later traditions lose the ''burning'' sense.

        '
    - term: paṭhamaṁ jhānaṁ
      grammar: ordinal compound
      note: first jhāna — the four jhānas are experienced in sequence
    sanskrit:
    - term: dhyāna
      grammar: neuter noun (√dhyai, to think/meditate)
      note: becomes a pāramitā in mahāyāna — dhyānapāramitā
    chinese:
    - term: 禪
      pinyin: chán
      translator: standard (transliteration of dhyāna)
      translation_choice_note: 'chán preserves the sound but loses the meaning. it becomes the name of an entire school (chan/zen)
        — a word that once described a practice state becomes a sectarian label.

        '
    - term: 禪定
      pinyin: chán dìng
      translator: common compound
      translation_choice_note: '''meditation-concentration'' — compound glossing two distinct terms'
    - term: 禪那
      pinyin: chán nà
      translator: closer transliteration
      translation_choice_note: more precise transliteration of jhāna/dhyāna
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'jhāna as EMBODIED EXPERIENCE — the practitioner enters and abides (upasampajja viharati). described through
      sensory language: joy (pīti), happiness (sukha), equanimity (upekkhā). the body is SUFFUSED: ''abhisandeti parisandeti
      paripūreti parippharati'' (permeates, saturates, suffuses, fills). this is somatic, not categorical.

      '
    citations:
    - reference: DN 2:75.1
      quote: vivicceva kāmehi vivicca akusalehi dhammehi savitakkaṁ savicāraṁ vivekajaṁ pītisukhaṁ paṭhamaṁ jhānaṁ upasampajja
        viharati
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn2_root-pli-ms.json
      context: first jhāna — experiential, not enumerated
    - reference: DN 2:75.2
      quote: imameva kāyaṁ vivekajena pītisukhena abhisandeti parisandeti paripūreti parippharati
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/dn/dn2_root-pli-ms.json
      context: BODY-SUFFUSION simile — jhāna is felt in the body, not analyzed in the mind
    drift_from_previous: n/a — baseline
    corpus_count: ~1246 (jhāna-terms in sutta piṭaka)
  - period: ~3rd c BCE - 5th c CE
    dating_confidence: medium
    tradition: abhidhamma / visuddhimagga
    meaning: 'jhāna becomes a CLASSIFIED STATE with precise jhāna factors (jhānaṅga): vitakka, vicāra, pīti, sukha, ekaggatā.
      buddhaghosa creates the 40 kammaṭṭhāna system and maps jhāna attainments onto specific meditation objects. the experiential
      language is replaced by factor analysis.

      '
    citations:
    - reference: Visuddhimagga line 692
      quote: kānassa lakkhaṇarasapaccupaṭṭhānapadaṭṭhānāni... avikkhepalakkhaṇo samādhi
      file: pali_commentary/visuddhimagga.txt
      context: buddhaghosa applies his universal formula to samādhi/jhāna
    drift_from_previous: 'FROM: ''enter and abide in the first jhāna'' (lived experience) TO: ''the first jhāna has 5 factors''
      (analytical classification). the body-suffusion similes disappear; factor-lists replace them.

      '
    corpus_count: ~378 (dhyāna in sanskrit mahāyāna)
  - period: ~4th-5th c CE
    dating_confidence: high
    tradition: yogācāra
    meaning: 'dhyāna becomes dhyānapāramitā — the fifth of six/ten perfections. it''s no longer a state you enter but a VIRTUE
      you cultivate across lifetimes. fully embedded in the bodhisattva path framework.

      '
    citations:
    - reference: Yogācārabhūmi (Asaṅga)
      quote: bodhisattvasya dhyānapāramitāyā gotraliṅgāni
      file: sanskrit/mahayana/sa_asanga-yogacarabhumi.txt
      context: dhyāna as pāramitā — perfection-category, not practice-experience
    drift_from_previous: 'FROM: classified mental state (abhidhamma factors) TO: perfection to be cultivated across aeons
      (pāramitā). the drift goes: experience → state-analysis → virtue-category.

      '
    corpus_count: ~492 (jhāna in visuddhimagga — scholastic treatment)
  valence:
    buddhist: affirmed — central practice
    vedic: cognate (dhyāna in upanishads = contemplation)
    jain: parallel (dhyāna in jain yoga = four types of meditation)
  standard_references:
    pts_dictionary: 'jhāna: meditation, usually inner contemplation... divided into 4 stages'
    monier_williams: 'dhyāna: meditation, thought, reflection'
    wisdomlib: meditative absorption, mental unification
    diff_notes: 'PTS says ''divided into 4 stages'' — this already systematizes what in the suttas is presented as lived experience.
      the ''division'' is a description of deepening practice, not a taxonomy.

      '
  index_contribution:
    MHI_register: practice → system
    collocational_markers:
    - viharati
    - upasampajja
    - bhāveti
    drift_direction: embodied experience → factor analysis → pāramitā category


# ─────────────────────────────────────────────────────────────
# 3. SAMADHI (concentration / composure / mental unification)
# ─────────────────────────────────────────────────────────────
samadhi:
  id: samadhi
  concept: concentration / composure / mental unification
  tier: primary
  family: ["jhana", "sati", "sila", "panna"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: samādhi
      grammar: masculine noun (sam + ā + √dhā, to place together)
      root: samādhāna (placing together)
      note: the mind placed together, unified, composed
    - term: sammāsamādhi
      grammar: compound
      note: right concentration — eighth factor of the noble eightfold path
    sanskrit:
    - term: samādhi
      grammar: masculine noun
      note: 'in yoga: the eighth limb (aṣṭāṅgayoga). in buddhism: part of the threefold training (sīla, samādhi, paññā). the
        term is shared but the CONTEXT differs — yoga samādhi aims at kaivalya (isolation of puruṣa), buddhist samādhi aims
        at nibbāna (extinction of craving).

        '
    chinese:
    - term: 定
      pinyin: dìng
      translator: standard (translation)
      translation_choice_note: '''settled, fixed, determined'' — captures the stability aspect'
    - term: 三昧
      pinyin: sānmèi
      translator: transliteration of samādhi
      translation_choice_note: phonetic borrowing — used especially in mahāyāna texts
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'samādhi as the OUTCOME of practice — what happens when you do satipaṭṭhāna correctly. defined functionally through
      purpose: sammāsamādhi leads to ''rāgavinaya, dosavinaya, mohavinaya'' (ending of greed, hatred, delusion). it''s described
      by what it DOES, not by what it IS.

      '
    citations:
    - reference: SN 45.149:3.4
      quote: sammāsamādhiṁ bhāveti rāgavinayapariyosānaṁ dosavinayapariyosānaṁ mohavinayapariyosānaṁ
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn45/sn45.149_root-pli-ms.json
      context: samādhi defined by PURPOSE — ending of greed, hatred, delusion
    - reference: SN 45.149:5.4
      quote: sammāsamādhiṁ bhāveti nibbānaninnaṁ nibbānapoṇaṁ nibbānapabbhāraṁ
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn45/sn45.149_root-pli-ms.json
      context: '''inclined toward nibbāna, sloping toward nibbāna'' — directional metaphor'
    drift_from_previous: n/a — baseline
    corpus_count: ~2611 (samādhi-terms in sutta piṭaka)
  - period: ~3rd c BCE - 5th c CE
    dating_confidence: medium
    tradition: abhidhamma / visuddhimagga
    meaning: 'samādhi receives the four-aspect analysis: avikkhepalakkhaṇo (characteristic of non-distraction), vikkhepaviddhaṃsanaraso
      (function of destroying distraction), avikampanapaccupaṭṭhāno (manifests as unshakeability). the directional metaphors
      (''sloping toward nibbāna'') are replaced by static definitions.

      '
    citations:
    - reference: Visuddhimagga line 695
      quote: avikkhepalakkhaṇo samādhi, vikkhepaviddhaṃsanaraso, avikampanapaccupaṭṭhāno
      file: pali_commentary/visuddhimagga.txt
      context: the four-aspect formula applied to samādhi — static category replaces flowing practice
    drift_from_previous: 'FROM: ''cultivate concentration that slopes toward nibbāna'' (direction) TO: ''concentration HAS
      the characteristic of non-distraction'' (definition). the direction (toward nibbāna) is replaced by the definition (what
      it IS).

      '
    corpus_count: ~336 (samādhi in sanskrit mahāyāna)
  valence:
    buddhist: affirmed — part of the threefold training
    vedic: shared term (samādhi in yoga = absorption/enstasis)
    jain: absent as technical term (jains use different meditation vocabulary)
  standard_references:
    pts_dictionary: concentration; a fixing of the mind on a single object
    monier_williams: putting together; joining... intense application or fixing the mind on
    wisdomlib: mental unification; one-pointedness of mind
    diff_notes: '''one-pointedness'' (ekaggatā) is an abhidhamma term that replaces the earlier directional descriptions. PTS
      and wisdomlib present the later categorical sense as primary.

      '
  index_contribution:
    MHI_register: practice → system
    collocational_markers:
    - bhāveti
    - viharati
    - nibbānaninnaṁ
    drift_direction: directional practice → static mental factor


# ─────────────────────────────────────────────────────────────
# 4. VIPASSANA (insight / clear seeing / discernment)
# ─────────────────────────────────────────────────────────────
vipassana:
  id: vipassana
  concept: insight / clear seeing / discernment
  tier: primary
  family: ["sati", "jhana", "samadhi", "panna"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: vipassanā
      grammar: feminine noun (vi + passanā = special/clear seeing)
      root: vi + √pas (to see)
      note: 'CRITICAL: vipassanā appears in only ~84 sutta files out of 5764 total (~1.5%). it is NOT the dominant practice
        term in the early texts. the modern ''vipassanā movement'' amplifies a relatively minor sutta term into THE central
        practice. THIS IS method-drift in action.

        '
    - term: vipassanāya samannāgato
      grammar: instrumental phrase
      note: '''possessed of insight'' — one quality among several'
    sanskrit:
    - term: vipaśyanā
      grammar: feminine noun
      note: 'in mahāyāna: paired with śamatha (calm) as the two wings of practice'
    chinese:
    - term: 觀
      pinyin: guān
      translator: standard (translation)
      translation_choice_note: '''observe, contemplate'' — paired with 止 (zhǐ = śamatha/calm) to form 止觀 (zhǐguān), the fundamental
        east asian meditation framework. zhìyǐ (天台) builds his entire system on this pair.

        '
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'vipassanā as ONE QUALITY among many — ''anirākatajjhāno vipassanāya samannāgato'' (not neglecting jhāna, possessing
      insight). always paired with other factors, never isolated as the central or sole practice. appears in 1.5% of sutta
      files vs. jhāna/samādhi/sati which appear far more frequently.

      '
    citations:
    - reference: MN 6:3.1
      quote: sīlesvevassa paripūrakārī ajjhattaṁ cetosamathamanuyutto anirākatajjhāno vipassanāya samannāgato
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/mn/mn6_root-pli-ms.json
      context: vipassanā listed as ONE factor alongside sīla, samatha, jhāna — not primary
    - reference: AN 2.31
      quote: samathañca vipassanañca
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an2/an2.21-31_root-pli-ms.json
      context: the samatha-vipassanā pair — calm and insight paired equally
    drift_from_previous: n/a — baseline
    corpus_count: ~419 (vipassanā in sutta piṭaka)
  - period: ~5th c CE
    dating_confidence: high
    tradition: theravāda commentarial (buddhaghosa)
    meaning: 'vipassanā becomes a SYSTEMATIC METHOD — buddhaghosa describes vipassanā-ñāṇa (insight-knowledges) as a precise
      sequence of 16 stages leading to liberation. the single sutta quality (''possessing insight'') expands into a detailed
      map of the contemplative path.

      '
    drift_from_previous: 'FROM: one quality among several in integrated practice TO: systematic progression of 16 insight-knowledges.
      the map replaces the territory.

      '
    corpus_count: ~492 (vipassanā in visuddhimagga)
  - period: ~20th century CE
    dating_confidence: high
    tradition: modern vipassanā movement
    meaning: 'vipassanā becomes THE central buddhist practice — extracted from the jhāna/samatha/sīla context and presented
      as a standalone technique. mahāsi sayādaw, goenka, and others create ''vipassanā meditation'' as a distinct practice
      that the suttas never describe in isolation.

      '
    drift_from_previous: 'FROM: systematic stage-model within commentarial framework TO: standalone technique marketed as
      THE buddha''s meditation. the 1.5% sutta term becomes 100% of popular buddhism''s meditation vocabulary. this is the
      most extreme case of method-drift in the entire book.

      '
    corpus_count: modern usage — outside corpus scope
  valence:
    buddhist: affirmed but overemphasized in modern traditions
    vedic: no direct cognate
    jain: no parallel (jain meditation uses different vocabulary)
  standard_references:
    pts_dictionary: inward vision, intuition, introspection
    monier_williams: vipaśyanā not listed (too buddhist-specific)
    wisdomlib: insight, clear seeing into the three characteristics
    diff_notes: '[!] wisdomlib defines vipassanā as ''clear seeing into the three characteristics (tilakkhaṇa)'' — this is
      the COMMENTARIAL definition, not the sutta one. the suttas never define vipassanā as seeing impermanence/suffering/not-self.
      that connection is made later.

      '
  index_contribution:
    MHI_register: practice → system
    collocational_markers:
    - samatha
    - ñāṇa
    - bhāveti
    drift_direction: one quality among many → 16-stage map → standalone technique


# ─────────────────────────────────────────────────────────────
# 5. PATIPADA (path / practice / way of going)
# ─────────────────────────────────────────────────────────────
patipada:
  id: patipada
  concept: path / practice / way of going
  tier: primary
  family: ["sila", "samadhi", "panna", "bhavana"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: paṭipadā
      grammar: feminine noun (paṭi + pad = walking toward)
      root: pratipad (stepping toward)
      note: 'literally ''a walking-toward'' — the metaphor is MOVEMENT, not a fixed structure. the ''middle way'' is a way
        of WALKING, not a doctrinal position.

        '
    - term: majjhimā paṭipadā
      grammar: compound
      note: the middle way — the buddha's first teaching at sārnāth
    sanskrit:
    - term: pratipad
      grammar: feminine noun
      note: way, path, means of attaining
    - term: madhyamā pratipad
      grammar: compound
      note: middle way — in mahāyāna, reinterpreted as the middle between existence and non-existence
    chinese:
    - term: 道
      pinyin: dào
      translator: standard
      translation_choice_note: 'dào (道) carries enormous weight in chinese — it IS the central term of daoism. using dào for
        paṭipadā/pratipad immediately places buddhism in dialogue with daoist metaphysics. this is TRANSLATION-INDUCED semantic
        drift.

        '
    - term: 中道
      pinyin: zhōng dào
      translator: standard
      translation_choice_note: '''middle dào'' — the middle way as daoist-buddhist hybrid'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'paṭipadā as WALKING — ''these two extremes should not be followed by one who has gone forth. what is the middle
      way realized by the tathāgata?'' the answer is the noble eightfold path — a way of LIVING, not a doctrinal system.

      '
    citations:
    - reference: SN 56.11:2.4
      quote: ete kho bhikkhave ubho ante anupagamma majjhimā paṭipadā tathāgatena abhisambuddhā cakkhukaraṇī ñāṇakaraṇī
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/sn/sn56/sn56.11_root-pli-ms.json
      context: first sermon — the middle way 'produces vision, produces knowledge'
    drift_from_previous: n/a — baseline
    corpus_count: ~1442 (paṭipadā in sutta piṭaka)
  - period: ~2nd c CE
    dating_confidence: medium
    tradition: madhyamaka (nāgārjuna)
    meaning: 'madhyamā pratipad becomes the philosophical MIDDLE between existence (bhāva) and non-existence (abhāva). the
      ''walking'' metaphor is replaced by a logical position between two extremes. the path becomes a VIEW.

      '
    drift_from_previous: 'FROM: ''the middle way between indulgence and mortification'' (practice) TO: ''the middle between
      existence and non-existence'' (ontology). the ethical/practical middle becomes a metaphysical middle.

      '
    corpus_count: ~135+ (madhyamā pratipad in MMK/prasannapadā)
  valence:
    buddhist: affirmed — foundational
    vedic: no direct equivalent
