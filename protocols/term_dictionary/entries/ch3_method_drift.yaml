# ─────────────────────────────────────────────────────────────
# 12. MATIKA (matrix / analytical grid / table of contents)
# ─────────────────────────────────────────────────────────────
matika:
  id: matika
  concept: matrix / analytical grid / table of contents
  tier: primary
  family: ["abhidhamma", "vibhajja", "kammatthana"]
  chapters: ["ch3"]
  semantic_field: practice-method
  forms:
    pali:
    - term: mātikā
      grammar: feminine noun (literally 'mother' → 'matrix, origin-list')
      root: mātṛkā (from mātṛ = mother)
      note: 'the metaphor is ''mother'' → ''generative source'' → ''table of contents that generates analysis.'' the mātikā
        are the SEED from which the entire abhidhamma system grows. they are lists of paired opposites (kusala-akusala, etc.)
        that serve as the analytical grid.

        '
    - term: mātikādhara
      grammar: compound (mātikā + dhara = bearer/holder)
      note: '''holders of the matrices'' — a recognized INSTITUTIONAL ROLE. monks designated as specialists who have memorized
        the classification grids. this is the bureaucratization of the buddha''s analytical method.

        '
    sanskrit:
    - term: mātṛkā
