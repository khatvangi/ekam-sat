    chinese:
    - term: 論母
      pinyin: lùnmǔ
      translator: translation
      translation_choice_note: '''treatise-mother'' — preserves the ''generative source'' metaphor'
    - term: 本母
      pinyin: běnmǔ
      translator: alternative
      translation_choice_note: '''root-mother'' — variant translation'
  temporal_strata:
  - period: ~450-250 BCE
    dating_confidence: low
    tradition: early buddhist
    meaning: 'mātikā as informal CLASSIFICATION AIDS — lists that help monks organize teachings for memorization and recitation.
      the mātikādhara (holders of matrices) appear alongside dhammadhara (holders of dhamma) and vinayadhara (holders of vinaya)
      — an organizational role, not a doctrinal one.

      '
    citations:
    - reference: AN 4.180:6.2
      quote: sambahulā therā bhikkhū viharanti bahussutā āgatāgamā dhammadharā vinayadharā mātikādharā
      file: pali_suttacentral/sc_bilara_data/root/pli/ms/sutta/an/an4/an4.180_root-pli-ms.json
      context: mātikādhara as institutional role — alongside dhamma-holders and vinaya-holders
    drift_from_previous: n/a — baseline
    corpus_count: ~303 (mātikā in canon)
  - period: ~3rd c BCE - 1st c CE
    dating_confidence: medium
    tradition: early abhidhamma
    meaning: 'mātikā become the STRUCTURAL FOUNDATION of the abhidhamma piṭaka. the dhammasaṅgaṇī opens with the abhidhamma-mātikā:
      22 triads (tika-mātikā) and 100 dyads (duka-mātikā) that generate the entire analytical system. the informal lists become
      the GENERATIVE GRAMMAR of scholastic buddhism.

      '
    drift_from_previous: 'FROM: memorization aids held by specialist monks TO: generative foundation of an entire philosophical
      system. the mnemonic tool becomes the analytical engine.

      '
    corpus_count: ~303+ (mātikā in abhidhamma piṭaka)
  - period: ~5th c CE
    dating_confidence: high
    tradition: visuddhimagga / theravāda commentarial
    meaning: 'buddhaghosa''s lakkhaṇa-rasa-paccupaṭṭhāna-padaṭṭhāna formula IS a mātikā applied to everything — a universal
      analytical grid. every dhamma concept must be analyzed through this four-aspect matrix. the method fully hardens.

      '
    citations:
